  function calTokenExpired() {
    const expiry = localStorage.getItem(CAL_EXPIRY_KEY);
    if (!expiry) return true;
    return Date.now() > parseInt(expiry) - 60000; // 1分余裕を持つ
  }

  function saveCalToken(token, expiresIn) {
    calAccessToken = token;
    localStorage.setItem(CAL_TOKEN_KEY, token);
    if (expiresIn) {
      localStorage.setItem(CAL_EXPIRY_KEY, String(Date.now() + expiresIn * 1000));
    }
  }

  // Silent token refresh using hidden iframe
  function silentRefreshCalToken() {
    return new Promise((resolve) => {
      if (!auth.currentUser) { resolve(false); return; }
      const params = new URLSearchParams({
        client_id: CAL_CLIENT_ID,
        redirect_uri: CAL_REDIRECT_URI,
        response_type: 'token',
        scope: 'https://www.googleapis.com/auth/calendar.readonly',
        prompt: 'none',
        login_hint: auth.currentUser.email
      });
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
      let resolved = false;
      const timeout = setTimeout(() => {
        if (!resolved) { resolved = true; cleanup(); resolve(false); }
      }, 8000);
      function cleanup() {
        clearTimeout(timeout);
        try { document.body.removeChild(iframe); } catch(e) {}
      }
      iframe.onload = function() {
        try {
          const hash = iframe.contentWindow.location.hash;
          if (hash && hash.includes('access_token')) {
            const p = new URLSearchParams(hash.substring(1));
            const token = p.get('access_token');
            const expiresIn = parseInt(p.get('expires_in') || '3600');
            if (token) {
              saveCalToken(token, expiresIn);
              resolved = true; cleanup(); resolve(true); return;
            }
          }
        } catch(e) { /* cross-origin, expected on error */ }
        if (!resolved) { resolved = true; cleanup(); resolve(false); }
      };
      document.body.appendChild(iframe);
    });
  }

  // Check for OAuth callback token in URL hash on page load
  (function checkOAuthCallback() {
    const hash = window.location.hash;
    if (hash.includes('access_token')) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get('access_token');
      const expiresIn = parseInt(params.get('expires_in') || '3600');
      if (token) {
        saveCalToken(token, expiresIn);
        history.replaceState(null, '', window.location.pathname);
        showSync('📅 カレンダー接続OK');
      }
    } else if (hash.includes('error=')) {
      const params = new URLSearchParams(hash.substring(1));
      const err = params.get('error');
      calAccessToken = null;
      localStorage.removeItem(CAL_TOKEN_KEY);
      localStorage.removeItem(CAL_EXPIRY_KEY);
      history.replaceState(null, '', window.location.pathname);
      if (err !== 'interaction_required' && err !== 'login_required') {
        showSync('⚠ カレンダー接続失敗: ' + err);
      }
    }
  })();

  window.connectCalendar = function() {
    if (!auth.currentUser) { showSync('⚠ 先にログインしてください'); return; }
    const params = new URLSearchParams({
      client_id: CAL_CLIENT_ID,
      redirect_uri: CAL_REDIRECT_URI,
      response_type: 'token',
      scope: 'https://www.googleapis.com/auth/calendar.readonly',
      prompt: 'consent',
      login_hint: auth.currentUser.email
    });
    window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
  };

  function updateCalUI() {
    const section = document.getElementById('calSection');
    const btn = document.getElementById('calConnectBtn');
    if (!section) return;
    if (currentUser) {
      section.style.display = '';
      btn.textContent = calAccessToken ? '✓ 接続済み' : '接続';
      btn.style.opacity = calAccessToken ? '0.5' : '1';
    } else {
      section.style.display = 'none';
    }
  }

  // Handle redirect result (mobile)
  auth.getRedirectResult().catch(() => {});

  auth.onAuthStateChanged(user => {
    currentUser = user;
    const dot = document.getElementById('authDot');
    const authUserDisplay = document.getElementById('authUserDisplay');
    const authActionBtn = document.getElementById('authActionBtn');
    if (user) {
      dot.classList.add('logged-in');
      dot.title = user.displayName || user.email;
      const dotM = document.getElementById('authDotMonth');
      if (dotM) { dotM.classList.add('logged-in'); dotM.title = dot.title; }
      authUserDisplay.innerHTML = `<img src="${user.photoURL || ''}" alt=""><span>${user.displayName || user.email}</span>`;
      authActionBtn.textContent = 'ログアウト';
      authActionBtn.onclick = signOut;
      showSync('同期中...');
      attachDBListeners(user.uid);
      updateCalUI();
      if (calAccessToken) {
        fetchCalendarEvents(selectedDate || todayStr()).then(() => render());
      }
    } else {
      dot.classList.remove('logged-in');
      dot.title = '未ログイン';
      authUserDisplay.innerHTML = '<span style="color:var(--text-sub);font-size:12px">未ログイン</span>';
      authActionBtn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" style="width:14px;height:14px;vertical-align:middle;margin-right:4px">ログイン';
      authActionBtn.onclick = signIn;
      detachDBListeners();
      tasks = JSON.parse(localStorage.getItem(TASK_KEY) || '[]');
      categories = JSON.parse(localStorage.getItem(CAT_KEY) || 'null');
      if (!categories || categories.length < 5) { categories = DEFAULT_CATS; }
      memos = JSON.parse(localStorage.getItem(MEMO_KEY) || '{}');
      populateCatSelects();
      updateCalUI();
      render();
    }
  });

  function attachDBListeners(uid) {
    detachDBListeners();
    const userRef = db.ref('users/' + uid);

    // Tasks
    const tasksRef = userRef.child('tasks');
    const tasksListener = tasksRef.on('value', snap => {
      const data = snap.val();
      tasks = data ? Object.values(data) : [];
      localStorage.setItem(TASK_KEY, JSON.stringify(tasks));
      render();
      showSync('✓ 同期完了');
    });
    dbListeners.push({ ref: tasksRef, event: 'value', cb: tasksListener });

    // Categories
    const catsRef = userRef.child('categories');
    const catsListener = catsRef.on('value', snap => {
      const data = snap.val();
      if (data) {
        categories = Object.values(data);
      } else {
        categories = DEFAULT_CATS;
        syncCatsToFirebase(uid);
      }
      localStorage.setItem(CAT_KEY, JSON.stringify(categories));
      populateCatSelects();
      render();
    });
    dbListeners.push({ ref: catsRef, event: 'value', cb: catsListener });

    // Memos
    const memosRef = userRef.child('memos');
    const memosListener = memosRef.on('value', snap => {
      const data = snap.val();
      memos = data || {};
      localStorage.setItem(MEMO_KEY, JSON.stringify(memos));
      loadMemo();
    });
    dbListeners.push({ ref: memosRef, event: 'value', cb: memosListener });

    // Lists
    const listsRef = userRef.child('lists');
    const listsListener = listsRef.on('value', snap => {
      const data = snap.val();
      if (data) {
        wishLists = Object.values(data).map(l => ({
          ...l,
          items: l.items ? (Array.isArray(l.items) ? l.items : Object.values(l.items)) : []
        }));
      }
      localStorage.setItem(LIST_KEY, JSON.stringify(wishLists));
      if ($('listView').classList.contains('show')) renderListView();
    });
    dbListeners.push({ ref: listsRef, event: 'value', cb: listsListener });

    // CalChecks
    const calChecksRef = userRef.child('calChecks');
    const calChecksListener = calChecksRef.on('value', snap => {
      const data = snap.val();
      calChecks = data || {};
      localStorage.setItem(CAL_CHECK_KEY, JSON.stringify(calChecks));
    });
    dbListeners.push({ ref: calChecksRef, event: 'value', cb: calChecksListener });

    // CalMemos
    const calMemosRef = userRef.child('calMemos');
    const calMemosListener = calMemosRef.on('value', snap => {
      const data = snap.val();
      calMemos = data || {};
      localStorage.setItem(CAL_MEMO_KEY, JSON.stringify(calMemos));
    });
    dbListeners.push({ ref: calMemosRef, event: 'value', cb: calMemosListener });

    // Upload local data if cloud is empty
    tasksRef.once('value', snap => {
      if (!snap.val() && tasks.length > 0) {
        syncTasksToFirebase(uid);
        showSync('ローカルデータをアップロード中...');
      }
    });
  }

  function detachDBListeners() {
    dbListeners.forEach(({ ref, event, cb }) => ref.off(event, cb));
    dbListeners = [];
  }

  function syncTasksToFirebase(uid) {
    if (!uid) return;
    const data = {};
    tasks.forEach(t => { data[t.id] = t; });
    db.ref('users/' + uid + '/tasks').set(data);
  }

  function syncCatsToFirebase(uid) {
    if (!uid) return;
    const data = {};
    categories.forEach(c => { data[c.id] = c; });
    db.ref('users/' + uid + '/categories').set(data);
  }

  function syncMemosToFirebase(uid) {
    if (!uid) return;
    db.ref('users/' + uid + '/memos').set(memos);
  }

  // Override save functions to sync to Firebase
  const _origSave = save;
  save = function() {
    localStorage.setItem(TASK_KEY, JSON.stringify(tasks));
    if (currentUser) syncTasksToFirebase(currentUser.uid);
  };

  const _origSaveCats = saveCats;
  saveCats = function() {
    localStorage.setItem(CAT_KEY, JSON.stringify(categories));
    if (currentUser) syncCatsToFirebase(currentUser.uid);
  };

  const _origSaveMemo = window.saveMemo;
  window.saveMemo = function() {
    const ds = selectedDate || todayStr();
    const val = document.getElementById('memoInput').value;
    if (val.trim()) memos[ds] = val;
    else delete memos[ds];
    localStorage.setItem(MEMO_KEY, JSON.stringify(memos));
    if (currentUser) syncMemosToFirebase(currentUser.uid);
    autoResizeMemo();
  };
</script>
</body>
</html>
