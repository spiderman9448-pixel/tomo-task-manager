<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#555555">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tasks">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #edecea; --surface: #fff; --text: #2d2d2d; --text-sub: #999;
      --border: #ebebeb; --primary: #666; --primary-hover: #555;
      --accent: #f0887d; --accent-bg: #fff5f4;
      --sat: #5590c8; --sun: #d45555; --holiday: #d45555;
      --radius: 14px; --shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    html, body {
      overflow-x: hidden; width: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-user-select: none; user-select: none;
      -webkit-overflow-scrolling: touch;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 16px 16px; overflow-x: hidden; }
    .settings-btn {
      width: 32px; height: 32px; border: none; border-radius: 6px;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: var(--text-sub);
      opacity: 0.5;
    }
    .settings-btn:active { opacity: 1; }

    /* Auth dot indicator */
    .auth-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ccc; display: inline-block; margin-left: 2px;
    }
    .auth-dot.logged-in { background: #dfff00; }
    /* Auth section in settings modal */
    .auth-section {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 12px;
    }
    .auth-section .auth-user {
      display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text);
    }
    .auth-section .auth-user img {
      width: 24px; height: 24px; border-radius: 50%;
    }
    .auth-section .auth-action-btn {
      padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); color: var(--text-sub); font-size: 12px; cursor: pointer;
    }
    .auth-section .auth-action-btn:active { transform: scale(0.97); }
    .sync-indicator {
      font-size: 10px; color: var(--text-sub); text-align: center; padding: 2px 0;
      opacity: 0; transition: opacity 0.3s;
    }
    .sync-indicator.show { opacity: 1; }

    .someday-btn {
      padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: #fff; color: var(--text-sub); font-size: 14px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .someday-btn.active {
      background: var(--primary); color: #fff; border-color: var(--primary);
    }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }

    /* Weekly Calendar */
    .week-cal {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden;
    }
    .week-header {
      display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 0;
    }
    .week-header .month-label { font-size: 18px; font-weight: 700; }
    .week-nav { display: flex; gap: 8px; }
    .week-nav button {
      width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center; color: var(--text-sub);
    }
    .week-days { display: grid; grid-template-columns: repeat(7, 1fr); padding: 12px 8px 14px; gap: 4px; }
    .week-day {
      display: flex; flex-direction: column; align-items: center;
      padding: 6px 0; border-radius: 10px; cursor: pointer;
    }
    .week-day:active { background: var(--bg); }
    .week-day.drop-target { background: rgba(59,130,246,0.15); transform: scale(1.1); }
    .task-card.drag-active { opacity: 0.6; transform: scale(0.95); }
    .week-day .dow { font-size: 11px; color: var(--text-sub); font-weight: 500; margin-bottom: 4px; }
    .week-day .day-num {
      font-size: 16px; font-weight: 700; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .week-day.selected .day-num { box-shadow: 0 0 0 2px var(--text-sub); }
    .week-day .dot-row { display: flex; gap: 2px; margin-top: 4px; height: 5px; }
    .week-day .task-dot { width: 4px; height: 4px; border-radius: 50%; }
    .week-day.sunday .dow, .week-day.sunday .day-num { color: var(--sun); }
    .week-day.saturday .dow, .week-day.saturday .day-num { color: var(--sat); }
    .week-day.today .day-num { background: #888; color: #fff; }
    .week-day.today.selected .day-num { box-shadow: 0 0 0 2px #888; }
    .week-day.today .dow { font-weight: 700; }

    /* Month calendar */
    .month-cal { display: none; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; }
    .month-cal.active { display: block; }
    .week-cal.hidden { display: none; }
    .month-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 8px; }
    .month-header .month-title { font-size: 18px; font-weight: 700; }
    .month-nav { display: flex; gap: 8px; }
    .month-nav button {
      width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center; color: var(--text-sub);
    }
    .month-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 8px; }
    .month-dow-cell { text-align: center; font-size: 11px; color: var(--text-sub); font-weight: 500; padding: 4px 0; }
    .month-dow-cell:first-child { color: var(--sun); }
    .month-dow-cell:last-child { color: var(--sat); }
    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 4px 8px 12px; gap: 2px; }
    .month-cell {
      display: flex; flex-direction: column; align-items: center;
      padding: 4px 0; border-radius: 8px; cursor: pointer; min-height: 40px;
    }
    .month-cell:active { background: var(--bg); }
    .month-cell .mc-num { font-size: 13px; font-weight: 600; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .month-cell.other-month .mc-num { color: #ccc; }
    .month-cell.today .mc-num { background: #888; color: #fff; }
    .month-cell.selected .mc-num { box-shadow: 0 0 0 2px var(--text-sub); }
    .month-cell.today.selected .mc-num { box-shadow: 0 0 0 2px #888; }
    .month-cell.sunday .mc-num { color: var(--sun); }
    .month-cell.saturday .mc-num { color: var(--sat); }
    .month-cell.other-month.sunday .mc-num, .month-cell.other-month.saturday .mc-num { color: #ddd; }
    .month-cell .mc-dots { display: flex; gap: 1px; margin-top: 2px; height: 4px; }
    .month-cell .mc-dot { width: 3px; height: 3px; border-radius: 50%; }
    .view-toggle {
      background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-sub);
      padding: 2px 8px; border-radius: 6px;
    }
    .view-toggle:active { background: var(--bg); }

    /* Day navigator */
    .day-nav {
      overflow: hidden; margin-bottom: 14px; touch-action: pan-y;
    }
    .day-nav-inner {
      display: flex; transition: transform 0.25s ease;
    }
    .day-card {
      min-width: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      padding: 10px 16px; min-height: 90px;
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .day-card .day-num-big {
      font-size: 32px; font-weight: 800; color: var(--text); line-height: 1;
    }
    .day-card .day-num-big .dow-small {
      font-size: 15px; font-weight: 700;
    }
    .day-card.today .day-num-big { color: var(--primary); }
    .day-card.holiday .day-num-big, .day-card.sunday .day-num-big { color: var(--sun); }
    .day-card.saturday .day-num-big { color: var(--sat); }
    .day-card .day-sub {
      font-size: 12px; color: var(--text-sub); margin-top: 3px;
    }
    .day-card .day-holiday {
      font-size: 11px; color: var(--holiday); font-weight: 600; margin-top: 2px;
    }

    /* Memo */
    .memo-area { margin-bottom: 12px; }
    .memo-area textarea {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 14px; font-family: inherit;
      background: var(--surface); color: var(--text); outline: none;
      resize: none; min-height: 40px; overflow: hidden;
    }
    .memo-area textarea:focus { border-color: var(--primary); }
    .memo-area textarea::placeholder { color: #bbb; }

    .filter-pills { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .pill {
      padding: 5px 14px; border: 1px solid var(--border); border-radius: 16px;
      background: var(--surface); font-size: 12px; font-weight: 500;
      color: var(--text-sub); cursor: pointer;
    }
    .pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .stats-inline { font-size: 12px; color: var(--text-sub); margin-bottom: 10px; }
    .stats-inline span { margin-right: 12px; }
    .stats-inline .overdue-count { color: var(--accent); font-weight: 600; }

    /* Category group */
    .cat-group { margin-bottom: 12px; }
    .cat-group-title {
      font-size: 13px; font-weight: 700; color: var(--text-sub); padding: 4px 0 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-tasks { display: flex; flex-direction: column; gap: 4px; }

    /* Task */
    .task-list { display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
    .swipe-wrapper { position: relative; overflow: hidden; border-radius: var(--radius); }
    .swipe-actions {
      position: absolute; top: 0; bottom: 0;
      display: flex; align-items: stretch;
      visibility: hidden;
    }
    .swipe-wrapper.swiping .swipe-actions { visibility: visible; }
    .swipe-actions.swipe-left { right: 0; }
    .swipe-actions.swipe-right { left: 0; }
    .task-card ~ .subtask-area { position: relative; z-index: 2; }
    .swipe-btn {
      width: 72px; border: none; cursor: pointer;
      font-size: 11px; font-weight: 600; color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    }
    .swipe-btn .swipe-icon { font-size: 16px; }
    .swipe-btn.move-btn { background: #5ec2b0; }
    .swipe-btn.edit-btn { background: #555; }
    .swipe-btn.del-btn { background: var(--sun); }

    .task-card {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); padding: 10px 14px;
      border-radius: var(--radius); box-shadow: var(--shadow);
      border-left: none;
      transition: transform 0.2s ease; touch-action: pan-y;
    }
    .task-card.swiped { transform: translateX(-112px); }
    .task-card.completed { opacity: 0.45; }
    .task-card.completed .task-name { text-decoration: line-through; }

    .drag-handle {
      display: flex; align-items: center; justify-content: center;
      width: 16px; flex-shrink: 0; color: #999; font-size: 16px;
      cursor: grab; touch-action: none; letter-spacing: -2px;
      margin-left: -6px;
    }
    .task-card.dragging { opacity: 0.6; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 10; }
    .drag-target { border-top: 2px solid #888 !important; }

    .task-card .checkbox {
      width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .task-card.completed .checkbox { background: var(--primary); border-color: var(--primary); }
    .task-card.completed .checkbox::after { content: "\2713"; color: #fff; font-size: 14px; font-weight: 700; }

    .task-info { flex: 1; min-width: 0; cursor: pointer; }
    .task-name-row { display: flex; align-items: center; gap: 8px; }
    .task-meta-row { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .task-name { font-size: 16px; font-weight: 600; word-break: break-word; flex: 1; }
    .task-name a, .sub-name a { color: #5590c8; text-decoration: underline; word-break: break-all; }
    .task-date { font-size: 12px; color: var(--text-sub); white-space: nowrap; flex-shrink: 0; }
    .task-date.overdue { color: var(--accent); font-weight: 600; }
    .cal-desc-preview { font-size: 12px; color: var(--text-sub); margin-top: 4px; line-height: 1.4; word-break: break-word; }
    .cal-memo-edit-btn { display: inline-block; margin-top: 6px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--text); }
    .cal-memo-edit-btn:active { background: var(--border); }
    .subtask-count { font-size: 11px; color: var(--text-sub); }
    .cat-tag {
      font-size: 10px; font-weight: 600; padding: 1px 7px;
      border-radius: 4px; color: #fff; white-space: nowrap; flex-shrink: 0;
    }

    .desktop-actions { display: none; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      width: 30px; height: 30px; border: none; border-radius: 6px;
      background: transparent; cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center; color: var(--text-sub);
    }
    @media (hover: hover) { .task-card:hover .desktop-actions { display: flex; } }
    @media (hover: none) { .desktop-actions { display: none !important; } }

    .subtask-area {
      display: none; padding: 6px 0 6px 80px; background: var(--surface);
      border-radius: 0 0 var(--radius) var(--radius); margin-top: -8px; padding-top: 12px;
    }
    .subtask-area.open { display: block; }
    .subtask-item { display: flex; align-items: center; gap: 8px; padding: 5px 14px 5px 0; }
    .sub-check {
      width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .sub-check.done { background: var(--primary); border-color: var(--primary); }
    .sub-check.done::after { content: "\2713"; color: #fff; font-size: 11px; font-weight: 700; }
    .sub-name { font-size: 14px; flex: 1; }
    .sub-name.done { text-decoration: line-through; opacity: 0.5; }
    .sub-del { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 13px; opacity: 0.4; }
    .add-subtask { display: flex; gap: 6px; padding: 5px 14px 6px 0; }
    .add-subtask input {
      flex: 1; padding: 6px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px; outline: none; background: var(--bg);
    }
    .add-subtask input:focus { border-color: var(--primary); }
    .add-subtask button {
      padding: 6px 12px; border: none; border-radius: 6px;
      background: #ccc; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
    }

    /* Modals */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.35); z-index: 100;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius);
      padding: 24px; width: 90%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .modal label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sub); margin: 12px 0 6px; }
    .modal label:first-of-type { margin-top: 0; }
    .modal input, .modal select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; background: #fff; outline: none;
    }
    .modal input:focus, .modal select:focus { border-color: var(--primary); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { background: var(--bg); color: var(--text); }

    /* Category settings */
    .cat-list { margin: 12px 0; }
    .cat-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .cat-item:last-child { border-bottom: none; }
    .cat-color-wrap {
      position: relative; width: 32px; height: 32px; flex-shrink: 0;
    }
    .cat-color-wrap .cat-color-dot {
      width: 32px; height: 32px; border-radius: 50%;
      pointer-events: none;
    }
    .cat-color-wrap input[type="color"] {
      position: absolute; top: 0; left: 0; width: 32px; height: 32px;
      opacity: 0; cursor: pointer;
    }
    .cat-item-name { flex: 1; font-size: 16px; font-weight: 600; white-space: nowrap; }
    .cat-item-del {
      background: none; border: none; cursor: pointer;
      font-size: 20px; padding: 4px 8px; color: var(--text-sub); opacity: 0.4;
      flex-shrink: 0;
    }
    .cat-item-del:active { opacity: 1; color: var(--high); }
    .add-cat-row { display: flex; gap: 8px; margin-top: 16px; align-items: center; }
    .add-cat-row input[type="text"] { flex: 1; padding: 10px 12px; }
    .add-cat-row .color-pick-wrap {
      position: relative; width: 42px; height: 42px; flex-shrink: 0;
    }
    .add-cat-row .color-preview {
      width: 42px; height: 42px; border-radius: 10px; pointer-events: none;
    }
    .add-cat-row input[type="color"] {
      position: absolute; top: 0; left: 0; width: 42px; height: 42px;
      opacity: 0; cursor: pointer;
    }

    /* FAB */
    .fab {
      position: fixed; bottom: 48px; right: 20px; z-index: 50;
      width: 56px; height: 56px; border-radius: 50%;
      background: #555; color: #fff; border: none;
      font-size: 32px; font-weight: 300; line-height: 1;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .fab:active { transform: scale(0.92); }

    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-sub); cursor: pointer; border-radius: 12px; transition: background 0.2s; }
    .empty-state:active { background: rgba(0,0,0,0.04); }
    .empty-state .icon { font-size: 40px; margin-bottom: 8px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }
    .empty-state .hint { font-size: 11px; margin-top: 6px; opacity: 0.6; }
    #taskList { min-height: 80px; padding-bottom: 20px; }
    .tap-to-add { min-height: 150px; cursor: pointer; }

    /* Wish Lists */
    .lists-btn {
      padding: 6px 16px; border: none; border-radius: 16px;
      background: #e8e6e3; font-size: 12px; font-weight: 600;
      color: #555; cursor: pointer; margin-left: auto;
    }
    .lists-btn:active { opacity: 0.7; transform: scale(0.97); }
    .list-view {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg); z-index: 200; overflow-y: auto;
    }
    .list-view.show { display: block; }
    .list-view-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1;
    }
    .list-view-header .back-btn {
      width: 32px; height: 32px; border: none; background: transparent;
      font-size: 20px; cursor: pointer; color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .list-view-header h2 { font-size: 18px; font-weight: 700; flex: 1; }
    .list-view-body { max-width: 800px; margin: 0 auto; padding: 16px; }
    .list-tabs {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .list-tabs::-webkit-scrollbar { display: none; }
    .list-tab {
      padding: 6px 16px; border: 1px solid var(--border); border-radius: 20px;
      background: var(--surface); font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; color: var(--text-sub);
    }
    .list-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .list-tab-add {
      padding: 6px 12px; border: 1px dashed var(--border); border-radius: 20px;
      background: transparent; font-size: 13px; cursor: pointer; color: var(--text-sub);
      white-space: nowrap;
    }
    .list-items { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
    .list-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); padding: 12px 14px;
      border-radius: var(--radius); box-shadow: var(--shadow);
      position: relative; z-index: 2;
    }
    .list-item.done { opacity: 0.45; }
    .list-item .checkbox {
      width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .list-item.done .checkbox { background: var(--primary); border-color: var(--primary); }
    .list-item.done .checkbox::after { content: "\2713"; color: #fff; font-size: 14px; font-weight: 700; }

<script>
  const TASK_KEY = 'task-manager-data';
  const CAT_KEY = 'task-manager-cats';
  const CAL_CHECK_KEY = 'task-manager-cal-checks';

  // Google Calendar integration
  const CAL_TOKEN_KEY = 'task-manager-cal-token';
  let calAccessToken = localStorage.getItem(CAL_TOKEN_KEY) || null;
  let calEvents = [];
  let calChecks = JSON.parse(localStorage.getItem(CAL_CHECK_KEY) || '{}');

  function saveCalChecks() {
    localStorage.setItem(CAL_CHECK_KEY, JSON.stringify(calChecks));
    if (currentUser) {
      db.ref('users/' + currentUser.uid + '/calChecks').set(calChecks);
    }
  }

  async function fetchCalendarEvents(dateStr) {
    if (!calAccessToken) { calEvents = []; return; }
    // Check if token expired, try silent refresh first
    if (calTokenExpired()) {
      const ok = await silentRefreshCalToken();
      if (!ok) { calEvents = []; updateCalUI(); return; }
    }
    try {
      const headers = { Authorization: 'Bearer ' + calAccessToken };
      const timeMin = dateStr + 'T00:00:00+09:00';
      const timeMax = dateStr + 'T23:59:59+09:00';
      // Get all calendars
      const listRes = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', { headers });
      if (listRes.status === 401) {
        // Try silent refresh once
        const ok = await silentRefreshCalToken();
        if (ok) { return fetchCalendarEvents(dateStr); }
        calAccessToken = null; localStorage.removeItem(CAL_TOKEN_KEY); localStorage.removeItem(CAL_EXPIRY_KEY);
        calEvents = []; updateCalUI(); showSync('⚠ カレンダー再接続してください'); return;
      }
      if (!listRes.ok) { calEvents = []; return; }
      const listData = await listRes.json();
      const calendars = (listData.items || []).filter(c => c.selected !== false);
      // Fetch events from all calendars in parallel
      const allEvents = [];
      await Promise.all(calendars.map(async cal => {
        try {
          const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&singleEvents=true&orderBy=startTime`;
          const res = await fetch(url, { headers });
          if (!res.ok) return;
          const data = await res.json();
          (data.items || []).filter(e => e.status !== 'cancelled').forEach(e => {
            allEvents.push({
              id: e.id,
              calendarId: cal.id,
              name: e.summary || '(無題)',
              description: e.description || '',
              startTime: e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) : '終日',
              endTime: e.end.dateTime ? new Date(e.end.dateTime).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) : '',
              allDay: !e.start.dateTime,
              calColor: cal.backgroundColor || '#4285f4'
            });
          });
        } catch(e) {}
      }));
      // Sort: all-day first, then by start time
      allEvents.sort((a, b) => {
        if (a.allDay && !b.allDay) return -1;
        if (!a.allDay && b.allDay) return 1;
        return (a.startTime || '').localeCompare(b.startTime || '');
      });
      calEvents = allEvents;
    } catch (e) { calEvents = []; }
  }

  function toggleCalCheck(eventId) {
    calChecks[eventId] = !calChecks[eventId];
    saveCalChecks();
    render();
  }

  function renderCalEvent(ev) {
    const checked = calChecks[ev.id];
    const timeLabel = ev.allDay ? '終日' : `${ev.startTime}〜${ev.endTime}`;
    const memo = calMemos[ev.id] || ev.description || '';
    const hasDesc = memo.trim();
    const descPreview = hasDesc ? `<div class="cal-desc-preview">${linkify(memo.replace(/\n/g, ' '))}</div>` : '';
    return `
      <div class="task-card ${checked ? 'completed' : ''}" style="border-left-color:#4285f4" data-cal-id="${encodeURIComponent(ev.calendarId)}" data-event-id="${ev.id}" onclick="if(!event.target.closest('a'))openCalMemoFromCard(this)">
        <div class="checkbox ${checked ? 'completed' : ''}" onclick="event.stopPropagation(); toggleCalCheck('${ev.id}')" style="${checked ? 'background:#4285f4;border-color:#4285f4' : ''}"></div>
        <div class="task-info">
          <div class="task-name-row">
            <span class="task-name">${escapeHtml(ev.name)}</span>
            <span class="task-date" style="color:#4285f4">${timeLabel}</span>
          </div>
          ${descPreview}
        </div>
      </div>`;
  }
  window.openCalMemoFromCard = function(card) {
    const calId = decodeURIComponent(card.dataset.calId);
    const eventId = card.dataset.eventId;
    openCalMemoEdit(calId, eventId);
  };
  window.openCalMemoEdit = function(calId, eventId) {
    const ev = calEvents.find(e => e.id === eventId);
    const googleDesc = ev ? ev.description : '';
    const localMemo = calMemos[eventId] || '';
    $('calMemoText').value = localMemo || googleDesc;
    $('calMemoModal').dataset.eventId = eventId;
    $('calMemoModal').classList.add('show');
    setTimeout(() => $('calMemoText').focus(), 100);
  };
  window.closeCalMemo = function() { $('calMemoModal').classList.remove('show'); };
  const CAL_MEMO_KEY = 'task-manager-cal-memos';
  let calMemos = JSON.parse(localStorage.getItem(CAL_MEMO_KEY) || '{}');
  function saveCalMemos() {
    localStorage.setItem(CAL_MEMO_KEY, JSON.stringify(calMemos));
    if (currentUser) db.ref('users/' + currentUser.uid + '/calMemos').set(calMemos);
  }
  window.saveCalMemo = function() {
    const eventId = $('calMemoModal').dataset.eventId;
    const memo = $('calMemoText').value.trim();
    if (memo) { calMemos[eventId] = memo; } else { delete calMemos[eventId]; }
    saveCalMemos();
    showSync('✅ メモを保存しました');
    closeCalMemo();
    render();
  };
  try { $('calMemoSaveBtn').addEventListener('click', () => saveCalMemo()); } catch(e) {}
  const DEFAULT_CATS = [
    { id: 'personal', name: 'プライベート', color: '#e0956e' },
    { id: 'work', name: '仕事', color: '#888' },
  ];

  let tasks = JSON.parse(localStorage.getItem(TASK_KEY) || '[]');
  let categories = JSON.parse(localStorage.getItem(CAT_KEY) || 'null');
  if (!categories || categories.length < 5) { categories = DEFAULT_CATS; saveCats(); }
  let currentFilter = 'all', selectedDate = todayStr(), weekOffset = 0, editingId = null;
  const openSubtasks = new Set();

  const $ = id => document.getElementById(id);
  const addForm = $('addForm'), taskInput = $('taskInput'),
        dateInput = $('dateInput'), catInput = $('catInput'),
        editModal = $('editModal'), catModal = $('catModal'),
        editName = $('editName'), editDate = $('editDate'), editCat = $('editCat');

  const DOW = ['日','月','火','水','木','金','土'];

  // Japanese holidays
  const HOLIDAYS = {
    '2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念の日','2025-02-23':'天皇誕生日',
    '2025-02-24':'振替休日','2025-03-20':'春分の日','2025-04-29':'昭和の日','2025-05-03':'憲法記念日',
    '2025-05-04':'みどりの日','2025-05-05':'こどもの日','2025-05-06':'振替休日',
    '2025-07-21':'海の日','2025-08-11':'山の日','2025-09-15':'敬老の日','2025-09-23':'秋分の日',
    '2025-10-13':'スポーツの日','2025-11-03':'文化の日','2025-11-23':'勤労感謝の日','2025-11-24':'振替休日',
    '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日','2026-02-23':'天皇誕生日',
    '2026-03-20':'春分の日','2026-04-29':'昭和の日','2026-05-03':'憲法記念日',
    '2026-05-04':'みどりの日','2026-05-05':'こどもの日','2026-05-06':'振替休日',
    '2026-07-20':'海の日','2026-08-11':'山の日','2026-09-21':'敬老の日','2026-09-22':'国民の休日',
    '2026-09-23':'秋分の日','2026-10-12':'スポーツの日','2026-11-03':'文化の日',
    '2026-11-23':'勤労感謝の日','2026-12-23':'天皇誕生日',
    '2027-01-01':'元日','2027-01-11':'成人の日','2027-02-11':'建国記念の日','2027-02-23':'天皇誕生日',
    '2027-03-21':'春分の日','2027-04-29':'昭和の日','2027-05-03':'憲法記念日',
    '2027-05-04':'みどりの日','2027-05-05':'こどもの日','2027-07-19':'海の日',
    '2027-08-11':'山の日','2027-09-20':'敬老の日','2027-09-23':'秋分の日',
    '2027-10-11':'スポーツの日','2027-11-03':'文化の日','2027-11-23':'勤労感謝の日',
  };
  function getHoliday(ds) { return HOLIDAYS[ds] || null; }

  function save() { localStorage.setItem(TASK_KEY, JSON.stringify(tasks)); }
  function saveCats() { localStorage.setItem(CAT_KEY, JSON.stringify(categories)); }
  function toStr(d) {
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  function todayStr() { return toStr(new Date()); }
  function isOverdue(date, done) { return date && date < todayStr() && !done; }
  function getCat(id) { return categories.find(c => c.id === id) || { name: '未分類', color: '#9ca3af' }; }
  function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function linkify(s) { return escapeHtml(s).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>'); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

  dateInput.value = todayStr();

  // Daily memos
  const MEMO_KEY = 'task-manager-memos';
  let memos = JSON.parse(localStorage.getItem(MEMO_KEY) || '{}');
  function loadMemo() {

  function autoResizeMemo() {

  }
  window.saveMemo = function() {
    const ds = selectedDate || todayStr();
    const val = $('memoInput').value;
    if (val.trim()) memos[ds] = val;
    else delete memos[ds];
    localStorage.setItem(MEMO_KEY, JSON.stringify(memos));

  };

  const addModal = $('addModal');
  window.openAddModal = function() {
    if (somedayMode) toggleSomeday();
    dateInput.value = selectedDate || todayStr();

  window.closeAddModal = function() { addModal.classList.remove('show'); };
  addModal.addEventListener('click', e => { if (e.target === addModal) closeAddModal(); });

  let somedayMode = false;
  window.toggleSomeday = function() {
    somedayMode = !somedayMode;
    $('somedayBtn').classList.toggle('active', somedayMode);
    dateInput.disabled = somedayMode;
    if (somedayMode) { dateInput.value = ''; dateInput.style.opacity = '0.4'; }
    else { dateInput.value = todayStr(); dateInput.style.opacity = '1'; }
  };

  function populateCatSelects() {
    const opts = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    catInput.innerHTML = opts;
    editCat.innerHTML = opts;
  }
  populateCatSelects();

  // Weekly calendar
  function getSunday(off) {
    const d = new Date(); d.setDate(d.getDate() - d.getDay() + off * 7); d.setHours(0,0,0,0); return d;
  }
  function renderWeek() {
    const sun = getSunday(weekOffset), days = [];
    for (let i = 0; i < 7; i++) { const d = new Date(sun); d.setDate(d.getDate() + i); days.push(d); }
    const m1 = days[0].getMonth()+1, m2 = days[6].getMonth()+1, y = days[0].getFullYear();
    $('monthLabel').textContent = m1 === m2 ? `${y}年${m1}月` : `${y}年${m1}月-${m2}月`;
    const t = todayStr();
    $('weekDays').innerHTML = days.map(d => {
      const ds = toStr(d), dow = d.getDay(), isT = ds === t, isSel = selectedDate === ds;
      const dayTasks = tasks.filter(tk => tk.date === ds && !tk.completed);
      const cats = [...new Set(dayTasks.map(tk => tk.category))];
      const dots = cats.slice(0, 3).map(cid => {
        const c = getCat(cid);
        return `<span class="task-dot" style="background:${c.color}"></span>`;
      }).join('');
      const hol = getHoliday(ds);
      let cls = 'week-day';
      if (isT) cls += ' today'; if (isSel) cls += ' selected';
      if (dow === 0 || hol) cls += ' sunday'; if (dow === 6) cls += ' saturday';
      return `<div class="${cls}" data-date="${ds}" onclick="selectDay('${ds}')">
        <span class="dow">${DOW[dow]}</span><span class="day-num">${d.getDate()}</span>
        <div class="dot-row">${dots}</div></div>`;
    }).join('');
  }

  // Day offset from today
  let dayOffset = 0;

  function getSelectedDateFromOffset() {
    const d = new Date();
    d.setDate(d.getDate() + dayOffset);
    return toStr(d);
  }

  function renderDayNav() {
    const inner = $('dayNavInner');
    // Render 3 days: prev, current, next
    const days = [-1, 0, 1].map(off => {
      const d = new Date();
      d.setDate(d.getDate() + dayOffset + off);
      return { date: d, str: toStr(d) };
    });
    inner.innerHTML = days.map(({ date, str }) => {
      const isT = str === todayStr();
      const hol = getHoliday(str);
      const taskCount = tasks.filter(t => t.date === str && !t.completed).length;
      const dow = date.getDay();
      let cls = 'day-card';
      if (isT) cls += ' today';
      if (hol || dow === 0) cls += ' sunday holiday';
      if (dow === 6) cls += ' saturday';
      const relLabel = formatDayLabel(str);
      return `<div class="${cls}">
        <div class="day-num-big">${date.getMonth()+1}/${date.getDate()}<span class="dow-small">(${DOW[date.getDay()]})</span></div>
        <div class="day-sub">${relLabel ? relLabel + ' ・ ' : ''}${taskCount > 0 ? taskCount + '件のタスク' : 'タスクなし'}</div>
        ${hol ? `<div class="day-holiday">${hol}</div>` : ''}
      </div>`;
    }).join('');
    inner.style.transition = 'none';
    inner.style.transform = 'translateX(-100%)';
    selectedDate = getSelectedDateFromOffset();
    // Update week view to match
    const sd = new Date();
    sd.setDate(sd.getDate() + dayOffset);
    weekOffset = Math.floor((sd.getTime() - getSunday(0).getTime()) / (7*86400000));
  }

  function formatDayLabel(ds) {
    const t = todayStr();
    const tmr = new Date(); tmr.setDate(tmr.getDate()+1);
    const yest = new Date(); yest.setDate(yest.getDate()-1);
    if (ds === t) return '今日';
    if (ds === toStr(tmr)) return '明日';
    if (ds === toStr(yest)) return '昨日';
    return '';
  }

  // Tap empty space in task list area to add task
  $('taskList').addEventListener('click', e => {
    if (e.target === $('taskList')) openAddModal();
  });
  document.querySelector('.tap-to-add').addEventListener('click', () => openAddModal());

  // Day swipe (touch + mouse)
  (function() {
    const nav = $('dayNav');
    let sx = 0, moving = false;
    function swipeMove(cx) {
      if (!moving) return;
      const diff = cx - sx;
      const inner = $('dayNavInner');
      inner.style.transition = 'none';
      inner.style.transform = `translateX(calc(-100% + ${diff}px))`;
    }
    function swipeEnd(cx) {
      if (!moving) return; moving = false;
      const diff = cx - sx;
      const inner = $('dayNavInner');
      if (diff < -50) {
        inner.style.transition = 'transform 0.2s ease';
        inner.style.transform = 'translateX(-200%)';
        setTimeout(() => { dayOffset++; renderDayNav(); renderWeek(); const d = new Date(); d.setDate(d.getDate()+dayOffset); selectedDate = toStr(d); fetchCalendarEvents(selectedDate).then(() => render()); }, 200);
      } else if (diff > 50) {
        inner.style.transition = 'transform 0.2s ease';
        inner.style.transform = 'translateX(0%)';
        setTimeout(() => { dayOffset--; renderDayNav(); renderWeek(); const d = new Date(); d.setDate(d.getDate()+dayOffset); selectedDate = toStr(d); fetchCalendarEvents(selectedDate).then(() => render()); }, 200);
      } else {
        inner.style.transition = 'transform 0.2s ease';
        inner.style.transform = 'translateX(-100%)';
      }
    }
    // Touch
    nav.addEventListener('touchstart', e => { sx = e.touches[0].clientX; moving = true; }, { passive: true });
    nav.addEventListener('touchmove', e => { swipeMove(e.touches[0].clientX); }, { passive: true });
    nav.addEventListener('touchend', e => { swipeEnd(e.changedTouches[0].clientX); });
    // Mouse (PC)
    nav.addEventListener('mousedown', e => { sx = e.clientX; moving = true; e.preventDefault(); });
    nav.addEventListener('mousemove', e => { swipeMove(e.clientX); });
    nav.addEventListener('mouseup', e => { swipeEnd(e.clientX); });
    nav.addEventListener('mouseleave', e => { if (moving) swipeEnd(e.clientX); });
  })();

  // ===== Monthly Calendar =====
  let calViewMode = 'week'; // 'week' or 'month'
  let monthViewYear = new Date().getFullYear();
  let monthViewMonth = new Date().getMonth();

  window.toggleCalView = function() {
    if (calViewMode === 'week') {
      calViewMode = 'month';
      // Set month view to selected date's month
      const sd = selectedDate ? new Date(selectedDate + 'T00:00:00') : new Date();
      monthViewYear = sd.getFullYear();
      monthViewMonth = sd.getMonth();
      document.querySelector('.week-cal').classList.add('hidden');
      $('monthCal').classList.add('active');
      $('calViewToggle').textContent = '週';
      renderMonthCal();
    } else {
      calViewMode = 'week';
      document.querySelector('.week-cal').classList.remove('hidden');
      $('monthCal').classList.remove('active');
      $('calViewToggle').textContent = '月';
      renderWeek();
    }
  };

  window.moveMonth = function(dir) {
    if (dir === 0) {
      monthViewYear = new Date().getFullYear();
      monthViewMonth = new Date().getMonth();
    } else {
      monthViewMonth += dir;
      if (monthViewMonth > 11) { monthViewMonth = 0; monthViewYear++; }
      if (monthViewMonth < 0) { monthViewMonth = 11; monthViewYear--; }
    }
    renderMonthCal();
  };

  function renderMonthCal() {
    $('monthTitle').textContent = `${monthViewYear}年${monthViewMonth + 1}月`;
    const firstDay = new Date(monthViewYear, monthViewMonth, 1);
    const startDow = firstDay.getDay(); // 0=Sun
    const daysInMonth = new Date(monthViewYear, monthViewMonth + 1, 0).getDate();
    const t = todayStr();
    let cells = '';

    // Previous month's trailing days
    const prevDays = new Date(monthViewYear, monthViewMonth, 0).getDate();
    for (let i = startDow - 1; i >= 0; i--) {
      const d = new Date(monthViewYear, monthViewMonth - 1, prevDays - i);
      const ds = toStr(d);
      const dow = d.getDay();
      let cls = 'month-cell other-month';
      if (dow === 0) cls += ' sunday';
      if (dow === 6) cls += ' saturday';
      cells += `<div class="${cls}" onclick="selectDayFromMonth('${ds}')"><span class="mc-num">${d.getDate()}</span><div class="mc-dots"></div></div>`;
    }

    // Current month days
    for (let day = 1; day <= daysInMonth; day++) {
      const d = new Date(monthViewYear, monthViewMonth, day);
      const ds = toStr(d);
      const dow = d.getDay();
      const dayTasks = tasks.filter(tk => tk.date === ds && !tk.completed);
      const cats = [...new Set(dayTasks.map(tk => tk.category))];
      const dots = cats.slice(0, 3).map(cid => {
        const c = getCat(cid);
        return `<span class="mc-dot" style="background:${c.color}"></span>`;
      }).join('');

      let cls = 'month-cell';
      if (ds === t) cls += ' today';
      if (selectedDate === ds) cls += ' selected';
      if (dow === 0 || getHoliday(ds)) cls += ' sunday';
      if (dow === 6) cls += ' saturday';
      cells += `<div class="${cls}" onclick="selectDayFromMonth('${ds}')"><span class="mc-num">${day}</span><div class="mc-dots">${dots}</div></div>`;
    }

    // Next month's leading days
    const totalCells = startDow + daysInMonth;
    const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= remaining; i++) {
      const d = new Date(monthViewYear, monthViewMonth + 1, i);
      const ds = toStr(d);
      const dow = d.getDay();
      let cls = 'month-cell other-month';
      if (dow === 0) cls += ' sunday';
      if (dow === 6) cls += ' saturday';
      cells += `<div class="${cls}" onclick="selectDayFromMonth('${ds}')"><span class="mc-num">${i}</span><div class="mc-dots"></div></div>`;
    }

    $('monthGrid').innerHTML = cells;
  }

  window.selectDayFromMonth = function(ds) {
    const target = new Date(ds + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    dayOffset = Math.round((target - today) / 86400000);
    selectedDate = ds;
    currentFilter = 'all'; updatePills();
    renderDayNav();
    if (calViewMode === 'month') renderMonthCal();
    else renderWeek();
    fetchCalendarEvents(ds).then(() => render());
  };

  // Swipe month calendar
  (function() {
    const el = $('monthGrid'); let sx = 0;
    if (!el) return;
    el.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      if (Math.abs(dx) > 60) moveMonth(dx < 0 ? 1 : -1);
    });
  })();

  window.selectDay = function(ds) {
    // Calculate dayOffset from ds
    const target = new Date(ds + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    dayOffset = Math.round((target - today) / 86400000);
    selectedDate = ds;
    currentFilter = 'all'; updatePills();
    renderDayNav(); renderWeek();
    fetchCalendarEvents(ds).then(() => render());
  };
  window.moveWeek = function(dir) {
    if (dir === 0) {
      weekOffset = 0; dayOffset = 0; selectedDate = todayStr();
    } else {
      dayOffset += dir * 7;
      selectedDate = getSelectedDateFromOffset();
      weekOffset += dir;
    }
    renderDayNav(); renderWeek(); render();
  };
  // Week calendar: click to select day, swipe to change week
  $('weekDays').addEventListener('click', e => {
    const dayEl = e.target.closest('.week-day');
    if (dayEl && dayEl.dataset.date) {
      selectDay(dayEl.dataset.date);
    }
  });
  (function() {
    const el = $('weekDays'); let sx = 0;
    el.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      if (Math.abs(dx) > 60) {
        moveWeek(dx < 0 ? 1 : -1);
      }
    }, { passive: true });
  })();

  function updatePills() {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    const a = document.querySelector(`.pill[data-filter="${currentFilter}"]`);
    if (a) a.classList.add('active');
  }
  $('filterPills').addEventListener('click', e => {
    const pill = e.target.closest('.pill'); if (!pill) return;
    currentFilter = pill.dataset.filter; selectedDate = null;
    updatePills(); renderWeek(); render();
  });

  function filterTasks() {
    return tasks.filter(task => {
      if (selectedDate) return task.date === selectedDate;
      switch (currentFilter) {
        case 'pending': return !task.completed;
        case 'done': return task.completed;
        case 'someday': return !task.date;
        default: return true;
      }
    });
  }

  function formatDate(ds) {
    if (!ds) return '';
    const t = todayStr();
    const tmr = new Date(); tmr.setDate(tmr.getDate()+1);
    const yest = new Date(); yest.setDate(yest.getDate()-1);
    if (ds === t) return '今日';
    if (ds === toStr(tmr)) return '明日';
    if (ds === toStr(yest)) return '昨日';
    const d = new Date(ds + 'T00:00:00');
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  function updateStats() {
    const total = tasks.length, done = tasks.filter(t => t.completed).length;
    const overdue = tasks.filter(t => isOverdue(t.date, t.completed)).length;
    let h = `<span>${done}/${total} 完了</span>`;
    if (overdue > 0) h += `<span class="overdue-count">${overdue}件 期限切れ</span>`;
    $('statsInline').innerHTML = h;
  }

  function renderTask(task) {
    const od = isOverdue(task.date, task.completed);
    const dateLabel = selectedDate ? '' : formatDate(task.date);
    const subs = task.subtasks || [];
    const dc = subs.filter(s => s.done).length;
    const subInfo = subs.length > 0 ? `<span class="subtask-count">${dc}/${subs.length}</span>` : '';
    const cat = getCat(task.category);
    return `
      <div class="swipe-wrapper">
        <div class="swipe-actions swipe-left">
          <button class="swipe-btn edit-btn" onclick="openEdit('${task.id}')"><span class="swipe-icon">&#9998;</span>編集</button>
          <button class="swipe-btn del-btn" onclick="deleteTask('${task.id}')"><span class="swipe-icon">&#10005;</span>削除</button>
        </div>
        <div class="task-card ${task.completed ? 'completed' : ''}" style="border-left-color:${cat.color}" data-id="${task.id}">
          <div class="drag-handle" data-drag="${task.id}">&#8942;&#8942;</div>
          <div class="checkbox" onclick="event.stopPropagation(); toggleComplete('${task.id}')"></div>
          <div class="task-info" onclick="if(!this.closest('.task-card').classList.contains('swiped'))toggleSubtasks('${task.id}')">
            <div class="task-name-row">
              <span class="task-name">${linkify(task.name)}</span>
              ${subInfo}
              ${dateLabel ? `<span class="task-date${od ? ' overdue' : ''}">${dateLabel}</span>` : ''}
            </div>
          </div>
          <div class="desktop-actions">
            <button class="icon-btn" onclick="openEdit('${task.id}')">&#9998;</button>
            <button class="icon-btn delete" onclick="deleteTask('${task.id}')">&#128465;</button>
          </div>
        </div>
        <div class="subtask-area ${openSubtasks.has(task.id) ? 'open' : ''}">
          ${subs.map((s, i) => `
            <div class="subtask-item">
              <div class="sub-check ${s.done ? 'done' : ''}" onclick="toggleSub('${task.id}',${i})"></div>
              <span class="sub-name ${s.done ? 'done' : ''}">${linkify(s.name)}</span>
              <button class="sub-del" onclick="delSub('${task.id}',${i})">&#10005;</button>
            </div>`).join('')}
          <div class="add-subtask">
            <input type="text" placeholder="サブタスク追加..." onkeydown="addSubKey(event,'${task.id}')" data-subinput="${task.id}">
          </div>
        </div>
      </div>`;
  }

  function render() {
    updateStats(); renderWeek(); loadMemo();
    const filtered = filterTasks();
    const hasCalEvents = selectedDate && calEvents.length > 0;
    if (filtered.length === 0 && !hasCalEvents) {
      $('taskList').innerHTML = '<div class="empty-state" onclick="openAddModal()"><div class="icon">&#10024;</div><p>タスクがありません</p><p class="hint">タップしてタスクを追加</p></div>';
      return;
    }
    let html = '';
    // Calendar events group
    if (hasCalEvents) {
      html += `<div class="cat-group">
        <div class="cat-group-title"><span class="cat-dot" style="background:#4285f4"></span>📅 カレンダー</div>
        <div class="task-list">${calEvents.map(renderCalEvent).join('')}</div>
      </div>`;
    }
    // Group by category
    const groups = {};
    filtered.forEach(t => {
      const cid = t.category || 'none';
      if (!groups[cid]) groups[cid] = [];
      groups[cid].push(t);
    });
    const catOrder = categories.map(c => c.id);
    const sortedKeys = Object.keys(groups).sort((a, b) => {
      const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
      return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    });
    for (const cid of sortedKeys) {
      const cat = getCat(cid);
      html += `<div class="cat-group">
        <div class="cat-group-title"><span class="cat-dot" style="background:${cat.color}"></span>${cat.name}</div>
        <div class="task-list">${groups[cid].map(renderTask).join('')}</div>
      </div>`;
    }
    $('taskList').innerHTML = html;
    initSwipe();
  }

  // Subtasks
  window.toggleSubtasks = function(id) { openSubtasks.has(id) ? openSubtasks.delete(id) : openSubtasks.add(id); render(); };
  window.addSub = function(id) {
    const inp = document.querySelector(`[data-subinput="${id}"]`);
    const name = inp.value.trim(); if (!name) return;
    const t = tasks.find(t => t.id === id); if (!t) return;
    if (!t.subtasks) t.subtasks = [];
    t.subtasks.push({ name, done: false }); save(); render();
  };
  window.addSubKey = function(e, id) { if (e.key === 'Enter') { e.preventDefault(); addSub(id); } };
  window.toggleSub = function(id, i) {
    const t = tasks.find(t => t.id === id);
    if (t && t.subtasks[i]) { t.subtasks[i].done = !t.subtasks[i].done; save(); render(); }
  };
  window.delSub = function(id, i) {
    const t = tasks.find(t => t.id === id); if (t) { t.subtasks.splice(i, 1); save(); render(); }
  };

  // Swipe
  function initSwipe() {
    document.querySelectorAll('.task-card').forEach(card => {
      let sx = 0, cx = 0, moved = false, sw = false, dir = 0;
      card.addEventListener('touchstart', e => {
        if (e.target.closest('.checkbox')) return;
        sx = e.touches[0].clientX; cx = sx; moved = false; sw = true; dir = 0;
        card.style.transition = 'none';
        // Close other cards
        document.querySelectorAll('.task-card').forEach(c => {
          if (c !== card) { c.style.transform = ''; c.closest('.swipe-wrapper').classList.remove('swiping'); }
        });
      }, { passive: true });
      card.addEventListener('touchmove', e => {
        if (!sw) return; cx = e.touches[0].clientX;
        const d = cx - sx;
        if (Math.abs(d) > 8) { moved = true; card.closest('.swipe-wrapper').classList.add('swiping'); }
        if (!moved) return;
        const clamped = Math.max(-144, Math.min(0, d));
        card.style.transform = `translateX(${clamped}px)`;
      }, { passive: true });
      card.addEventListener('touchend', () => {
        if (!sw) return; sw = false; card.style.transition = 'transform 0.2s ease';
        const wrap = card.closest('.swipe-wrapper');
        if (!moved) { card.style.transform = ''; wrap.classList.remove('swiping'); return; }
        const d = cx - sx;
        if (d < -50) {
          card.style.transform = 'translateX(-144px)';
        } else {
          card.style.transform = ''; wrap.classList.remove('swiping');
        }
      });
    });
  }

  // CRUD
  addForm.addEventListener('submit', e => {
    e.preventDefault();
    const name = taskInput.value.trim(); if (!name) return;
    tasks.unshift({
      id: uid(), name, date: dateInput.value, category: catInput.value,
      completed: false, subtasks: [], createdAt: new Date().toISOString()
    });
    save(); render();
    taskInput.value = '';
    if (somedayMode) toggleSomeday();
    closeAddModal();
  });
  window.toggleComplete = function(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.completed = !t.completed; save(); render(); }
  };
  window.deleteTask = function(id) { tasks = tasks.filter(t => t.id !== id); save(); render(); };

  // Move date
  let movingTaskId = null;
  const moveModal = $('moveModal');
  window.openMoveDate = function(id) {

    const t = tasks.find(t => t.id === id);
    $('moveDate').value = t && t.date ? t.date : todayStr();
    moveModal.classList.add('show');

  window.closeMoveModal = function() { moveModal.classList.remove('show'); movingTaskId = null; };
  moveModal.addEventListener('click', e => { if (e.target === moveModal) closeMoveModal(); });
  window.confirmMove = function() {
    const t = tasks.find(t => t.id === movingTaskId);
    if (t) {
      t.date = $('moveDate').value;
      save();
      if (t.date) selectDay(t.date);
      else render();
    }
    closeMoveModal();
  };
  window.openEdit = function(id) {
    const t = tasks.find(t => t.id === id); if (!t) return;
    editingId = id; editName.value = t.name;
    editDate.value = t.date || ''; editCat.value = t.category || '';
    editModal.classList.add('show');
  };
  function closeEdit() { editModal.classList.remove('show'); editingId = null; }

  window.moveTaskUp = function() {
    const idx = tasks.findIndex(t => t.id === editingId);
    if (idx > 0) { [tasks[idx-1], tasks[idx]] = [tasks[idx], tasks[idx-1]]; save(); render(); }
  };
  window.moveTaskDown = function() {
    const idx = tasks.findIndex(t => t.id === editingId);
    if (idx < tasks.length - 1) { [tasks[idx], tasks[idx+1]] = [tasks[idx+1], tasks[idx]]; save(); render(); }
  };
  $('editCancel').addEventListener('click', closeEdit);
  editModal.addEventListener('click', e => { if (e.target === editModal) closeEdit(); });
  $('editSave').addEventListener('click', () => {
    const t = tasks.find(t => t.id === editingId); if (!t) return;
    const name = editName.value.trim(); if (!name) return;

    save(); render(); closeEdit();
  });

  // Category management
  window.openCatSettings = function() {
    renderCatList();
    catModal.classList.add('show');
  };
  catModal.addEventListener('click', e => { if (e.target === catModal) catModal.classList.remove('show'); });

  function renderCatList() {
    $('catList').innerHTML = categories.map((c, i) => `
      <div class="cat-item">
        <div class="cat-color-wrap">
          <div class="cat-color-dot" style="background:${c.color}" id="catDot${i}"></div>
          <input type="color" value="${c.color}" onchange="updateCatColor(${i}, this.value); $('catDot${i}').style.background=this.value">
        </div>
        <span class="cat-item-name">${escapeHtml(c.name)}</span>
        <button class="cat-item-del" onclick="deleteCategory(${i})">&#10005;</button>
      </div>`).join('');
  }

  window.addCategory = function() {
    const name = $('newCatName').value.trim(); if (!name) return;
    const color = $('newCatColor').value;
    categories.push({ id: uid(), name, color });
    saveCats(); populateCatSelects(); renderCatList();
    $('newCatName').value = '';
  };
  window.updateCatColor = function(i, color) {
    categories[i].color = color; saveCats(); render();
  };
  window.deleteCategory = function(i) {
    const cid = categories[i].id;
    categories.splice(i, 1); saveCats(); populateCatSelects(); renderCatList(); render();
  };

  // Drag task to calendar day to change date
  let dragTaskId = null, longPressTimer = null, dragStartY = 0;

  document.addEventListener('touchstart', e => {
    const card = e.target.closest('.task-card');
    if (!card || e.target.closest('.checkbox') || e.target.closest('.icon-btn')) return;
    dragStartY = e.touches[0].clientY;
    longPressTimer = setTimeout(() => {
      dragTaskId = card.dataset.id;
      card.classList.add('drag-active');
      try { navigator.vibrate(30); } catch(e) {}
    }, 500);
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!dragTaskId) {
      // Cancel long press if finger moves too much
      if (longPressTimer && Math.abs(e.touches[0].clientY - dragStartY) > 10) {
        clearTimeout(longPressTimer);
      }
      return;
    }
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    document.querySelectorAll('.week-day.drop-target').forEach(d => d.classList.remove('drop-target'));
    const dayEl = el && el.closest('.week-day');
    if (dayEl) dayEl.classList.add('drop-target');
  }, { passive: true });

  document.addEventListener('touchend', e => {
    clearTimeout(longPressTimer);
    if (!dragTaskId) return;
    document.querySelectorAll('.drag-active').forEach(c => c.classList.remove('drag-active'));
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const dayEl = el && el.closest('.week-day');
    document.querySelectorAll('.drop-target').forEach(d => d.classList.remove('drop-target'));
    if (dayEl) {
      const newDate = dayEl.getAttribute('data-date');
      if (newDate) {
        const task = tasks.find(t => t.id === dragTaskId);
        if (task) { task.date = newDate; save(); selectDay(newDate); }
      }
    }
    dragTaskId = null;
  });


  // Drag handle reorder (touch + mouse)
  let dragId = null;
  function dragStart(handle) {
    dragId = handle.dataset.drag;
    const card = handle.closest('.task-card');
    if (card) card.classList.add('dragging');
    try { navigator.vibrate(20); } catch(ex) {}
  }
  function dragMove(x, y) {
    if (!dragId) return;
    const el = document.elementFromPoint(x, y);
    document.querySelectorAll('.drag-target').forEach(c => c.classList.remove('drag-target'));
    const target = el && el.closest('.task-card');
    if (target && target.dataset.id !== dragId) target.classList.add('drag-target');
  }
  function dragEnd(x, y) {
    if (!dragId) return;
    document.querySelectorAll('.dragging').forEach(c => c.classList.remove('dragging'));
    document.querySelectorAll('.drag-target').forEach(c => c.classList.remove('drag-target'));
    const el = document.elementFromPoint(x, y);
    const target = el && el.closest('.task-card');
    if (target && target.dataset.id !== dragId) {
      const fi = tasks.findIndex(t => t.id === dragId);
      const ti = tasks.findIndex(t => t.id === target.dataset.id);
      if (fi !== -1 && ti !== -1) {
        const [moved] = tasks.splice(fi, 1);
        tasks.splice(ti, 0, moved);
        save(); render();
      }
    }
    dragId = null;
  }
  // Touch
  document.addEventListener('touchstart', e => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    e.preventDefault();
    dragStart(handle);
  }, { passive: false });
  document.addEventListener('touchmove', e => { if (!dragId) return; e.preventDefault(); dragMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  document.addEventListener('touchend', e => { if (!dragId) return; dragEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });
  // Mouse (PC)
  document.addEventListener('mousedown', e => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    e.preventDefault();
    dragStart(handle);
  });
  document.addEventListener('mousemove', e => { if (!dragId) return; e.preventDefault(); dragMove(e.clientX, e.clientY); });
  document.addEventListener('mouseup', e => { if (!dragId) return; dragEnd(e.clientX, e.clientY); });

  // === Wish Lists ===
  const LIST_KEY = 'task-manager-lists';
  let wishLists = JSON.parse(localStorage.getItem(LIST_KEY) || 'null');
  if (!wishLists) {
    wishLists = [
      { id: uid(), name: 'やりたいこと', items: [] },
      { id: uid(), name: '行きたい場所', items: [] },
    ];
    saveLists();
  }
  let activeListId = wishLists[0] ? wishLists[0].id : null;
  let schedulingItemId = null;
  let schedulingListId = null;

  function saveLists() {
    localStorage.setItem(LIST_KEY, JSON.stringify(wishLists));
    if (currentUser) syncListsToFirebase(currentUser.uid);
  }

  function syncListsToFirebase(uid) {
    if (!uid) return;
    const data = {};
    wishLists.forEach(l => { data[l.id] = l; });
    db.ref('users/' + uid + '/lists').set(data);
  }

  window.openListView = function() {
    $('listView').classList.add('show');
    if (wishLists.length > 0 && !wishLists.find(l => l.id === activeListId)) {
      activeListId = wishLists[0].id;
    }
    renderListView();
  };
  window.closeListView = function() { $('listView').classList.remove('show'); };

  function renderListView() {
    // Tabs
    const tabsHtml = wishLists.map(l =>
      `<button class="list-tab ${l.id === activeListId ? 'active' : ''}" onclick="switchList('${l.id}')">${escapeHtml(l.name)}</button>`
    ).join('') + `<button class="list-tab-add" onclick="addNewList()">+ 新規</button>`;
    $('listTabs').innerHTML = tabsHtml;

    // Content
    const list = wishLists.find(l => l.id === activeListId);
    if (!list) {
      $('listContent').innerHTML = '<div class="list-empty"><div class="icon">📋</div><p>リストを作成してください</p></div>';
      return;
    }
    const items = list.items || [];
    let html = '<div class="list-items">';
    if (items.length === 0) {
      html += '<label for="listItemInput" class="list-empty" style="cursor:pointer;display:block"><div class="icon">✨</div><p>アイテムがありません</p><p style="font-size:12px;color:var(--text-sub)">タップして追加</p></label>';
    } else {
      items.forEach((item, i) => {
        html += `<div class="swipe-wrapper">
          <div class="swipe-actions swipe-left">
            <button class="swipe-btn edit-btn" onclick="editListItem('${list.id}',${i})"><span class="swipe-icon">&#9998;</span>編集</button>
            <button class="swipe-btn del-btn" onclick="deleteListItem('${list.id}',${i})"><span class="swipe-icon">&#10005;</span>削除</button>
          </div>
          <div class="list-item ${item.done ? 'done' : ''}" data-li="${i}">
            <div class="checkbox" onclick="toggleListItem('${list.id}',${i})"></div>
            <span class="list-item-name">${linkify(item.name)}</span>
            <button class="list-cal-btn" onclick="event.stopPropagation(); scheduleListItem('${list.id}',${i})" title="日付を設定">📅</button>
            <div class="desktop-actions">
              <button class="icon-btn" onclick="editListItem('${list.id}',${i})" title="編集">&#9998;</button>
              <button class="icon-btn delete" onclick="deleteListItem('${list.id}',${i})" title="削除">&#128465;</button>
            </div>
          </div>
        </div>`;

      });
    }
    html += '</div>';
    html += `<div class="list-add-row">
      <input type="text" id="listItemInput" placeholder="アイテムを追加..." oncompositionstart="window._liComp=true" oncompositionend="setTimeout(function(){window._liComp=false},300)" onkeydown="if(event.key==='Enter'&&!event.isComposing&&!window._liComp){event.preventDefault();addListItem();}">
      <button onclick="addListItem()">追加</button>
    </div>`;
    html += `<div class="list-manage-bar">
      <button onclick="renameList('${list.id}')">✏️ 名前変更</button>
      <button onclick="deleteList('${list.id}')">🗑 リスト削除</button>
    </div>`;
    $('listContent').innerHTML = html;
    initListSwipe();
  }

  function initListSwipe() {
    document.querySelectorAll('.list-item[data-li]').forEach(card => {
      let sx = 0, cx = 0, moved = false, sw = false;
      card.addEventListener('touchstart', e => {
        if (e.target.closest('.checkbox') || e.target.closest('.list-cal-btn')) return;
        sx = e.touches[0].clientX; cx = sx; moved = false; sw = true;
        card.style.transition = 'none';
        document.querySelectorAll('.list-item[data-li]').forEach(c => {
          if (c !== card) { c.style.transform = ''; const w = c.closest('.swipe-wrapper'); if (w) w.classList.remove('swiping'); }
        });
      }, { passive: true });
      card.addEventListener('touchmove', e => {
        if (!sw) return; cx = e.touches[0].clientX;
        const d = cx - sx;
        if (Math.abs(d) > 8) { moved = true; const w = card.closest('.swipe-wrapper'); if (w) w.classList.add('swiping'); }
        if (!moved) return;
        card.style.transform = `translateX(${Math.max(-144, Math.min(0, d))}px)`;
      }, { passive: true });
      card.addEventListener('touchend', () => {
        if (!sw) return; sw = false; card.style.transition = 'transform 0.2s ease';
        const wrap = card.closest('.swipe-wrapper');
        if (!moved) { card.style.transform = ''; if (wrap) wrap.classList.remove('swiping'); return; }
        if (cx - sx < -50) {
          card.style.transform = 'translateX(-144px)';
        } else {
          card.style.transform = ''; if (wrap) wrap.classList.remove('swiping');
        }
      });
    });
  }

  window.editListItem = function(listId, idx) {
    const list = wishLists.find(l => l.id === listId);
    if (!list || !list.items[idx]) return;
    $('listNameTitle').textContent = 'アイテムを編集';
    $('listNameInput').value = list.items[idx].name;
    listNameCallback = 'editItem:' + listId + ':' + idx;
    $('listNameModal').classList.add('show');
    setTimeout(() => $('listNameInput').focus(), 100);
  };

  window.switchList = function(id) { activeListId = id; renderListView(); };

  let listNameCallback = null;
  let deletingListId = null;

  window.addNewList = function() {
    $('listNameTitle').textContent = '新しいリスト';
    $('listNameInput').value = '';
    listNameCallback = 'add';
    $('listNameModal').classList.add('show');
    setTimeout(() => $('listNameInput').focus(), 100);
  };

  window.renameList = function(id) {
    const list = wishLists.find(l => l.id === id);
    if (!list) return;
    $('listNameTitle').textContent = 'リスト名を変更';
    $('listNameInput').value = list.name;
    listNameCallback = 'rename:' + id;
    $('listNameModal').classList.add('show');
    setTimeout(() => $('listNameInput').focus(), 100);
  };

  window.closeListNameModal = function() { $('listNameModal').classList.remove('show'); };
  try {
    $('listNameModal').addEventListener('click', e => { if (e.target === $('listNameModal')) closeListNameModal(); });
    let listNameComposing = false;
    $('listNameInput').addEventListener('compositionstart', () => { listNameComposing = true; });
    $('listNameInput').addEventListener('compositionend', () => { setTimeout(() => { listNameComposing = false; }, 300); });
    $('listNameInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing && !listNameComposing) { e.preventDefault(); confirmListName(); } });
  } catch(e) { console.log('listNameModal init error:', e); }

  window.confirmListName = function() {
    const name = $('listNameInput').value.trim();
    if (!name) return;
    if (listNameCallback === 'add') {
      const newList = { id: uid(), name, items: [] };
      wishLists.push(newList);
      activeListId = newList.id;
    } else if (listNameCallback && listNameCallback.startsWith('rename:')) {
      const id = listNameCallback.split(':')[1];
      const list = wishLists.find(l => l.id === id);
      if (list) list.name = name;
    } else if (listNameCallback && listNameCallback.startsWith('editItem:')) {
      const parts = listNameCallback.split(':');
      const listId = parts[1], idx = parseInt(parts[2]);
      const list = wishLists.find(l => l.id === listId);
      if (list && list.items[idx]) list.items[idx].name = name;
    }
    saveLists();
    if (currentUser) syncListsToFirebase(currentUser.uid);
    closeListNameModal();
    renderListView();
  };

  window.deleteList = function(id) {
    deletingListId = id;
    $('listDeleteModal').classList.add('show');
  };
  window.closeListDelete = function() { $('listDeleteModal').classList.remove('show'); deletingListId = null; };
  try {
    $('listDeleteModal').addEventListener('click', e => { if (e.target === $('listDeleteModal')) closeListDelete(); });
  } catch(e) { console.log('listDeleteModal init error:', e); }

  window.confirmListDelete = function() {
    wishLists = wishLists.filter(l => l.id !== deletingListId);
    if (activeListId === deletingListId) activeListId = wishLists[0] ? wishLists[0].id : null;
    saveLists();
    if (currentUser) syncListsToFirebase(currentUser.uid);
    closeListDelete();
    renderListView();
  };

  window.addListItem = function() {
    const input = $('listItemInput');
    const name = input.value.trim();
    if (!name) return;
    const list = wishLists.find(l => l.id === activeListId);
    if (!list) return;
    if (!list.items) list.items = [];
    list.items.push({ id: uid(), name, done: false });
    saveLists();
    if (currentUser) syncListsToFirebase(currentUser.uid);
    input.value = '';
    renderListView();
    setTimeout(() => $('listItemInput').focus(), 50);
  };

  window.toggleListItem = function(listId, idx) {
    const list = wishLists.find(l => l.id === listId);
    if (list && list.items[idx]) {
      list.items[idx].done = !list.items[idx].done;
      saveLists();
      if (currentUser) syncListsToFirebase(currentUser.uid);
      renderListView();
    }
  };

  window.deleteListItem = function(listId, idx) {
    const list = wishLists.find(l => l.id === listId);
    if (list) {
      list.items.splice(idx, 1);
      saveLists();
      if (currentUser) syncListsToFirebase(currentUser.uid);
      renderListView();
    }
  };

  window.scheduleListItem = function(listId, idx) {
    schedulingListId = listId;
    schedulingItemId = idx;
    $('listScheduleDate').value = todayStr();
    // Populate category select
    $('listScheduleCat').innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    $('listScheduleModal').classList.add('show');
  };

  window.closeListSchedule = function() {
    $('listScheduleModal').classList.remove('show');
    schedulingItemId = null;
    schedulingListId = null;
  };
  try { $('listScheduleModal').addEventListener('click', e => { if (e.target === $('listScheduleModal')) closeListSchedule(); }); } catch(e) {}

  window.confirmListSchedule = function() {
    const list = wishLists.find(l => l.id === schedulingListId);
    if (!list || !list.items[schedulingItemId]) { closeListSchedule(); return; }
    const item = list.items[schedulingItemId];
    const date = $('listScheduleDate').value;
    const cat = $('listScheduleCat').value;
    // Create task from list item
    tasks.unshift({
      id: uid(), name: item.name, date: date, category: cat,
      completed: false, subtasks: [], createdAt: new Date().toISOString()
    });
    // Remove from list
    list.items.splice(schedulingItemId, 1);
    save(); saveLists();
    if (currentUser) syncListsToFirebase(currentUser.uid);
    closeListSchedule();
    renderListView();
    showSync('✓ タスクに移動しました');
  };

  selectedDate = todayStr();
  renderDayNav();
  render();

  // PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>

  const CAL_CLIENT_ID = '19435255015-1uah4hoitcjafu0it223ub3fk5a049tb.apps.googleusercontent.com';
  const CAL_REDIRECT_URI = 'https://spiderman9448-pixel.github.io/tomo-task-manager/';
