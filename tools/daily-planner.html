<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>デイリープランナー</title>
<link rel="manifest" href="./planner-manifest.json">
<link rel="apple-touch-icon" href="./planner-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f0887d">
<script>
// Force clear old service workers
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #edecea;
  --surface: #fff;
  --text: #2d2d2d;
  --text-sub: #999;
  --border: #ebebeb;
  --primary: #666;
  --primary-hover: #555;
  --accent: #f0887d;
  --accent-bg: #fff5f4;
  --radius: 14px;
  --shadow: 0 2px 8px rgba(0,0,0,0.04);
  --high: #e74c3c;
  --mid: #f39c12;
  --low: #3498db;
  --break-bg: #f7f7f5;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: 100px;
  overflow-x: hidden;
}
.container { max-width: 500px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .date { font-size: 13px; color: var(--text-sub); margin-left: 8px; }
.settings-btn {
  background: none; border: none; font-size: 22px; cursor: pointer;
  color: var(--text-sub); padding: 4px;
}

/* Time Range */
.time-range {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border-radius: var(--radius);
  padding: 12px 16px; margin-bottom: 16px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.time-range label { font-size: 13px; color: var(--text-sub); white-space: nowrap; }
.time-range input[type="time"] {
  border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 8px; font-size: 15px; font-family: inherit;
  color: var(--text); background: var(--bg); width: 100px;
}
.time-range .sep { color: var(--text-sub); font-size: 16px; }

/* Task Input */
.input-section {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px; margin-bottom: 16px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.input-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.input-row {
  display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
}
.input-row input[type="text"] {
  flex: 1; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 15px; font-family: inherit;
  color: var(--text); background: var(--bg);
}
.input-row input[type="text"]:focus { outline: none; border-color: var(--accent); }
.add-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 10px 16px; font-size: 14px;
  cursor: pointer; font-family: inherit; font-weight: 600;
  white-space: nowrap;
}
.add-btn:active { transform: scale(0.97); }

/* Task List */
.task-list { margin-bottom: 16px; }
.task-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border-radius: 10px;
  padding: 10px 12px; margin-bottom: 6px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  position: relative; cursor: pointer;
}
.task-item:active { background: #f8f8f6; }
.task-item .priority-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.task-item .priority-dot.high { background: var(--high); }
.task-item .priority-dot.mid { background: var(--mid); }
.task-item .priority-dot.low { background: var(--low); }
.task-item .task-name { flex: 1; font-size: 14px; }
.task-item .task-meta {
  display: flex; align-items: center; gap: 6px;
}
.task-item .task-time { font-size: 12px; color: var(--text-sub); white-space: nowrap; }
.task-item .task-priority-label {
  font-size: 10px; padding: 1px 6px; border-radius: 4px; color: #fff;
}
.task-item .task-priority-label.high { background: var(--high); }
.task-item .task-priority-label.mid { background: var(--mid); }
.task-item .task-priority-label.low { background: var(--low); }
.task-item .delete-btn {
  background: none; border: none; color: var(--text-sub);
  font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
}
.task-item .delete-btn:hover { color: var(--high); }

/* Task Edit Modal */
.task-edit-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); display: none; z-index: 150;
  align-items: center; justify-content: center;
}
.task-edit-overlay.show { display: flex; }
.task-edit-box {
  background: var(--surface); border-radius: var(--radius);
  padding: 20px; width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.task-edit-box h3 { font-size: 16px; margin-bottom: 14px; }
.task-edit-box .field { margin-bottom: 14px; }
.task-edit-box .field label {
  display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 4px;
}
.task-edit-box .field input[type="text"],
.task-edit-box .field input[type="number"] {
  width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 15px; font-family: inherit; color: var(--text);
}
.task-edit-box .field input:focus { outline: none; border-color: var(--accent); }
.task-edit-box .priority-select { display: flex; gap: 6px; }
.task-edit-box .priority-select .p-opt {
  flex: 1; border: 2px solid var(--border); border-radius: 8px;
  padding: 8px; text-align: center; font-size: 13px; cursor: pointer;
  font-family: inherit; background: var(--surface); color: var(--text-sub);
  transition: all 0.15s;
}
.task-edit-box .priority-select .p-opt.active {
  color: #fff; border-color: transparent;
}
.task-edit-box .priority-select .p-opt[data-p="high"].active { background: var(--high); }
.task-edit-box .priority-select .p-opt[data-p="mid"].active { background: var(--mid); }
.task-edit-box .priority-select .p-opt[data-p="low"].active { background: var(--low); }
.task-edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
.task-edit-box .type-select { display: flex; gap: 6px; }
.task-edit-box .type-select .t-opt {
  flex: 1; border: 2px solid var(--border); border-radius: 8px;
  padding: 8px; text-align: center; font-size: 13px; cursor: pointer;
  font-family: inherit; background: var(--surface); color: var(--text-sub);
  transition: all 0.15s;
}
.task-edit-box .type-select .t-opt.active {
  border-color: transparent; color: #fff;
}
.task-edit-box .type-select .t-opt[data-t="active"].active { background: #27ae60; }
.task-edit-box .type-select .t-opt[data-t="sit"].active { background: #3b82f6; }
.task-item .type-badge {
  font-size: 10px; padding: 1px 5px; border-radius: 4px; color: #fff;
}
.task-item .type-badge.active { background: #27ae60; }
.task-item .type-badge.sit { background: #3b82f6; }
.timeline-card .type-icon { font-size: 12px; flex-shrink: 0; }
.task-edit-actions button {
  border: none; border-radius: 8px; padding: 10px 18px;
  font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 600;
}
.task-edit-actions .btn-cancel { background: var(--bg); color: var(--text); }
.task-edit-actions .btn-save { background: var(--accent); color: #fff; }

/* Generate Buttons */
.gen-buttons {
  display: flex; gap: 8px; margin-bottom: 20px;
}
.gen-btn {
  flex: 1; border: none; border-radius: var(--radius);
  padding: 14px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.gen-btn:active { transform: scale(0.97); }
.gen-btn.manual {
  background: var(--primary); color: #fff;
}
.gen-btn.ai {
  background: linear-gradient(135deg, #d97706, #ea580c);
  color: #fff;
}
.gen-btn:disabled {
  opacity: 0.5; cursor: not-allowed; transform: none;
}

/* Schedule Result */
.schedule-section { margin-bottom: 20px; }
.schedule-section h2 {
  font-size: 15px; font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.schedule-section h2 .clear-btn {
  font-size: 12px; color: var(--text-sub); background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 2px 8px; cursor: pointer; font-family: inherit;
}
.timeline { position: relative; }
.timeline-item {
  display: flex; gap: 6px; margin-bottom: 2px; position: relative;
  cursor: grab; user-select: none;
}
.timeline-item.dragging { opacity: 0.4; }
.timeline-item.drag-over { border-top: 2px solid var(--accent); margin-top: -2px; }
.timeline-time {
  width: 44px; text-align: right; font-size: 13px; font-weight: 600;
  color: var(--text-sub); padding-top: 10px; flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.timeline-card {
  flex: 1; background: var(--surface); border-radius: 10px;
  padding: 10px 14px; border: 1px solid var(--border);
  box-shadow: var(--shadow); position: relative;
  min-height: 44px; display: flex; align-items: center; gap: 8px;
}
.timeline-card .priority-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.timeline-card .priority-dot.high { background: var(--high); }
.timeline-card .priority-dot.mid { background: var(--mid); }
.timeline-card .priority-dot.low { background: var(--low); }
.timeline-card .tl-name { flex: 1; font-size: 15px; font-weight: 600; }
.timeline-card .tl-duration {
  font-size: 11px; color: var(--text-sub);
  background: var(--bg); padding: 2px 6px; border-radius: 4px;
}
.timeline-card.break-card {
  background: transparent; border: none; box-shadow: none;
  min-height: 24px; padding: 4px 14px;
}
.timeline-card.break-card .tl-name { color: var(--text-sub); font-size: 11px; }
.timeline-card.break-card .tl-duration { background: transparent; }
.timeline-card.meal-card {
  background: #fffbf0; border: 1.5px solid #f0d9a0; box-shadow: var(--shadow);
  min-height: 40px; padding: 8px 14px;
}
.timeline-card.meal-card .tl-name { color: var(--text); font-size: 14px; font-weight: 600; }
.timeline-card .tl-motivation {
  display: block; font-size: 11px; color: var(--accent); margin-top: 2px;
  line-height: 1.4;
}
.timeline-card .tl-check {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-radius: 5px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; background: var(--surface);
}
.timeline-card .tl-check.checked {
  background: #27ae60; border-color: #27ae60; color: #fff;
}
.timeline-card.done { opacity: 0.45; }
.timeline-card.done .tl-name { text-decoration: line-through; }
.timeline-now {
  display: flex; align-items: center; gap: 6px;
  margin: 4px 0; z-index: 10;
}
.timeline-now .now-time {
  width: 44px; text-align: right; font-size: 11px; font-weight: 700;
  color: var(--high); flex-shrink: 0;
}
.timeline-now .now-line {
  flex: 1; height: 2px; background: var(--high);
}
.timeline-now .now-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--high); flex-shrink: 0; margin-left: -4px;
}
.timeline-end {
  display: flex; gap: 12px; margin-top: 2px;
}
.timeline-end .timeline-time { color: var(--text-sub); }
.timeline-end .end-label { font-size: 13px; color: var(--text-sub); padding-top: 10px; }

/* Edit time modal */
.time-edit-popup {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); display: none; z-index: 100;
  align-items: center; justify-content: center;
}
.time-edit-popup.show { display: flex; }
.time-edit-box {
  background: var(--surface); border-radius: var(--radius);
  padding: 20px; width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.time-edit-box h3 { font-size: 15px; margin-bottom: 12px; }
.time-edit-box input[type="time"] {
  width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px; font-size: 16px; font-family: inherit; margin-bottom: 12px;
}
.time-edit-box .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
.time-edit-box .edit-actions button {
  border: none; border-radius: 8px; padding: 8px 16px;
  font-size: 13px; cursor: pointer; font-family: inherit;
}
.time-edit-box .btn-cancel { background: var(--bg); color: var(--text); }
.time-edit-box .btn-save { background: var(--accent); color: #fff; }

/* Settings Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); display: none; z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 24px; width: 90%; max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 4px; }
.modal input[type="password"], .modal input[type="text"] {
  width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 14px; font-family: inherit;
  margin-bottom: 12px; color: var(--text);
}
.modal input:focus { outline: none; border-color: var(--accent); }
.modal .note { font-size: 11px; color: var(--text-sub); margin-bottom: 16px; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button {
  border: none; border-radius: 8px; padding: 10px 20px;
  font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 600;
}
.modal-actions .btn-cancel { background: var(--bg); color: var(--text); }
.modal-actions .btn-primary { background: var(--accent); color: #fff; }

/* Loading */
.loading { text-align: center; padding: 20px; color: var(--text-sub); font-size: 13px; }
.loading .spinner {
  width: 24px; height: 24px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text-sub);
  font-size: 13px; line-height: 1.8;
}

/* AI suggestion note */
.ai-note {
  background: var(--accent-bg); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 12px;
  font-size: 13px; color: var(--text); line-height: 1.6;
}

/* Template Buttons */
.template-section { margin-bottom: 12px; }
.template-btns {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.tmpl-btn {
  border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font-size: 12px; cursor: pointer;
  font-family: inherit; background: var(--surface);
  color: var(--text); box-shadow: var(--shadow);
  transition: all 0.15s;
}
.tmpl-btn:active { transform: scale(0.97); }
.tmpl-btn.holiday { border-color: #e0d4f5; background: #faf5ff; }
.tmpl-btn.suggest { border-color: #fde68a; background: #fffbeb; font-weight: 600; }
.tmpl-btn.loaded { opacity: 0.5; }

/* Suggest Popup */
.suggest-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); display: none; z-index: 150;
  align-items: center; justify-content: center;
}
.suggest-overlay.show { display: flex; }
.suggest-box {
  background: var(--surface); border-radius: var(--radius);
  padding: 20px; width: 320px; max-height: 80vh; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.suggest-box h3 { font-size: 16px; margin-bottom: 6px; }
.suggest-box .suggest-subtitle {
  font-size: 12px; color: var(--text-sub); margin-bottom: 14px; line-height: 1.5;
}
.suggest-box .balance-bar {
  display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
}
.suggest-box .balance-tag {
  font-size: 11px; padding: 3px 8px; border-radius: 6px;
  background: var(--bg); color: var(--text-sub);
}
.suggest-box .balance-tag.warn { background: #fef3c7; color: #92400e; }
.suggest-box .balance-tag.good { background: #d1fae5; color: #065f46; }
.suggest-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 6px; cursor: pointer; transition: all 0.15s;
}
.suggest-item:active { transform: scale(0.98); }
.suggest-item .s-icon { font-size: 16px; }
.suggest-item .s-info { flex: 1; }
.suggest-item .s-name { font-size: 14px; display: block; }
.suggest-item .s-reason { font-size: 11px; color: var(--text-sub); }
.suggest-item .s-add {
  background: var(--accent); color: #fff; border: none;
  border-radius: 6px; padding: 4px 10px; font-size: 12px;
  cursor: pointer; font-family: inherit;
}
.suggest-close {
  display: block; width: 100%; margin-top: 10px; padding: 10px;
  background: var(--bg); border: none; border-radius: 8px;
  font-size: 14px; cursor: pointer; font-family: inherit; color: var(--text);
}

@media (max-width: 600px) {
  .container { padding: 10px; }
  .input-row input[type="text"] { font-size: 16px; }
  .time-range input[type="time"] { font-size: 16px; }
  .timeline-card { padding: 8px 10px; gap: 6px; }
  .timeline-card .tl-check { width: 18px; height: 18px; }
  .timeline-card .type-icon { font-size: 11px; }
  .timeline-card .tl-name { font-size: 15px; }
  .timeline-card .tl-motivation { font-size: 10px; }
  .timeline-end { gap: 6px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:baseline;">
      <h1>デイリープランナー</h1>
      <span class="date" id="todayDate"></span>
    </div>
    <button class="settings-btn" onclick="showSettings()">⚙</button>
  </div>

  <!-- Time Range -->
  <div class="time-range">
    <label>起床</label>
    <input type="time" id="wakeTime" value="07:00">
    <span class="sep">〜</span>
    <label>就寝</label>
    <input type="time" id="sleepTime" value="23:00">
  </div>

  <!-- Template Buttons -->
  <div class="template-section">
    <div class="template-btns">
      <button class="tmpl-btn" onclick="loadTemplate('daily')">📋 毎日ルーティン</button>
      <button class="tmpl-btn" onclick="loadTemplate('weekly')">📅 今日の週一タスク</button>
      <button class="tmpl-btn holiday" onclick="loadTemplate('holiday')">🏖 休みの日</button>
      <button class="tmpl-btn" onclick="loadTemplate('monthly')">🗓 今日の月1掃除</button>
      <button class="tmpl-btn" onclick="loadTemplate('danshari')">🗑 今日の断捨離</button>
      <button class="tmpl-btn suggest" onclick="showSuggest()">💡 迷ったらこれ</button>
    </div>
  </div>

  <!-- Task Input -->
  <div class="input-section">
    <h2>今日やりたいこと</h2>
    <form id="taskForm" onsubmit="return addTask(event)">
      <div class="input-row" style="margin-bottom:0">
        <input type="text" id="taskNameInput" placeholder="タスク名を入力">
        <button type="submit" class="add-btn">追加</button>
      </div>
    </form>
  </div>

  <!-- Task List -->
  <div class="task-list" id="taskList"></div>

  <!-- Generate Buttons -->
  <div class="gen-buttons" id="genButtons" style="display:none;">
    <button class="gen-btn manual" onclick="generateManual()">手動で組む</button>
    <button class="gen-btn ai" onclick="generateAI()" id="aiBtn">AIに提案してもらう</button>
  </div>

  <!-- Schedule Result -->
  <div class="schedule-section" id="scheduleSection" style="display:none;">
    <h2>
      タイムテーブル
      <button class="clear-btn" onclick="clearSchedule()">クリア</button>
    </h2>
    <div class="ai-note" id="aiNote" style="display:none;"></div>
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<!-- Suggest Popup -->
<div class="suggest-overlay" id="suggestOverlay" onclick="if(event.target===this)closeSuggest()">
  <div class="suggest-box">
    <h3>💡 今日のおすすめ</h3>
    <div class="suggest-subtitle" id="suggestSubtitle"></div>
    <div class="balance-bar" id="balanceBar"></div>
    <div id="suggestList"></div>
    <button class="suggest-close" onclick="closeSuggest()">閉じる</button>
  </div>
</div>

<!-- Task Edit Modal -->
<div class="task-edit-overlay" id="taskEditOverlay" onclick="if(event.target===this)closeTaskEdit()">
  <div class="task-edit-box">
    <h3 id="taskEditTitle">タスクを編集</h3>
    <div class="field">
      <label>タスク名</label>
      <input type="text" id="editTaskName">
    </div>
    <div class="field">
      <label>所要時間（分）</label>
      <input type="number" id="editTaskDuration" min="5" max="480" step="5" placeholder="30">
    </div>
    <div class="field">
      <label>タイプ</label>

function loadTemplate(type) {
  let newTasks = [];
  if (type === 'daily') {
    newTasks = TEMPLATES.daily;
  } else if (type === 'weekly') {
    const dow = new Date().getDay();
    newTasks = TEMPLATES.weekly[dow] || [];
    if (!newTasks.length) { alert('今日の週一タスクはありません'); return; }
  } else if (type === 'holiday') {
    newTasks = TEMPLATES.holiday;
  } else if (type === 'monthly') {
    // Pick 2 tasks based on day of month (rotates through the list)
    const dom = new Date().getDate();
    const list = TEMPLATES.monthly;
    const idx1 = (dom * 2 - 2) % list.length;
    const idx2 = (dom * 2 - 1) % list.length;
    newTasks = [list[idx1], list[idx2]];
  } else if (type === 'danshari') {
    // Pick 2 decluttering tasks based on day of month
    const dom = new Date().getDate();
    const list = TEMPLATES.danshari;
    const idx1 = (dom * 2) % list.length;
    const idx2 = (dom * 2 + 1) % list.length;
    newTasks = [list[idx1], list[idx2]];
  }

  // Add only tasks not already in the list (by name)
  const existingNames = new Set(tasks.map(t => t.name));
  let added = 0;
  for (const t of newTasks) {
    if (!existingNames.has(t.name)) {
      existingNames.add(t.name);
      tasks.push({ id: Date.now() + added, ...t });
      added++;
    }
  }

  if (added === 0) {
    alert('すべて追加済みです');
    return;
  }

  renderTasks();
  saveState();
}

// ── Suggest ──
function showSuggest() {
  const existingNames = new Set(tasks.map(t => t.name));
  const activeCount = tasks.filter(t => t.type === 'active').length;
  const sitCount = tasks.filter(t => t.type !== 'active').length;
  const totalDur = tasks.reduce((s, t) => s + t.duration, 0);
  const highCount = tasks.filter(t => t.priority === 'high').length;
  const lowCount = tasks.filter(t => t.priority === 'low').length;

  // Balance analysis
  const bars = [];
  const activeRatio = tasks.length ? activeCount / tasks.length : 0;
  if (activeRatio < 0.3) bars.push({ text: '活動が少なめ', warn: true });
  else if (activeRatio > 0.7) bars.push({ text: '座りが少なめ', warn: true });
  else bars.push({ text: '活動/座りバランス◎', warn: false });

  if (highCount === 0) bars.push({ text: '重要タスクがない', warn: true });
  else bars.push({ text: '重要タスクあり◎', warn: false });

  if (lowCount === 0) bars.push({ text: 'お楽しみがない', warn: true });
  else bars.push({ text: 'お楽しみあり◎', warn: false });

  if (totalDur > 480) bars.push({ text: `合計${totalDur}分 (詰めすぎ?)`, warn: true });
  else bars.push({ text: `合計${totalDur}分`, warn: false });

  document.getElementById('balanceBar').innerHTML = bars.map(b =>
    `<span class="balance-tag ${b.warn ? 'warn' : 'good'}">${b.text}</span>`
  ).join('');

  // Build suggestions
  const suggestions = [];
  const dow = new Date().getDay();

  // Check missing daily tasks
  const missingDaily = TEMPLATES.daily.filter(t => !existingNames.has(t.name));
  // Check missing weekly tasks
  const missingWeekly = (TEMPLATES.weekly[dow] || []).filter(t => !existingNames.has(t.name));
  // Check missing holiday tasks
  const missingHoliday = TEMPLATES.holiday.filter(t => !existingNames.has(t.name));

  // Prioritize suggestions based on balance
  const addedNames = new Set();
  function addSugg(t, reason) {
    if (addedNames.has(t.name)) return;
    addedNames.add(t.name);
    suggestions.push({ ...t, reason });
  }

  if (activeRatio > 0.7) {
    [...missingDaily, ...missingWeekly, ...missingHoliday].filter(t => t.type !== 'active')
      .forEach(t => addSugg(t, '座って集中する時間も大事'));
  }
  if (activeRatio < 0.3) {
    [...missingDaily, ...missingWeekly, ...missingHoliday].filter(t => t.type === 'active')
      .forEach(t => addSugg(t, '体を動かそう！'));
  }
  if (highCount === 0) {
    [...missingDaily, ...missingWeekly, ...missingHoliday].filter(t => t.priority === 'high')
      .forEach(t => addSugg(t, '今日の重要タスクとして'));
  }
  if (lowCount === 0) {
    missingHoliday.filter(t => t.priority === 'low')
      .forEach(t => addSugg(t, '自分へのご褒美に'));
  }

  // Add remaining missing weekly tasks
  missingWeekly.forEach(t => addSugg(t, '今日の曜日タスク'));
  // Add missing daily tasks
  missingDaily.forEach(t => addSugg(t, '毎日のルーティン'));

  // Add monthly tasks not yet done
  const dom = new Date().getDate();
  const mIdx1 = (dom * 2 - 2) % TEMPLATES.monthly.length;
  const mIdx2 = (dom * 2 - 1) % TEMPLATES.monthly.length;
  [TEMPLATES.monthly[mIdx1], TEMPLATES.monthly[mIdx2]]
    .filter(t => !existingNames.has(t.name))
    .forEach(t => addSugg(t, '今日の月1掃除'));

  // Add today's danshari
  const dIdx1 = (dom * 2) % TEMPLATES.danshari.length;
  const dIdx2 = (dom * 2 + 1) % TEMPLATES.danshari.length;
  [TEMPLATES.danshari[dIdx1], TEMPLATES.danshari[dIdx2]]
    .filter(t => !existingNames.has(t.name))
    .forEach(t => addSugg(t, '今日の断捨離'));

  // Add some fun suggestions if nothing else
  if (suggestions.length === 0) {
    const extras = [
      { name: '散歩に行く', duration: 30, priority: 'low', type: 'active', reason: 'リフレッシュに' },
      { name: '読書', duration: 30, priority: 'low', type: 'sit', reason: '自分の時間を楽しんで' },
      { name: 'ストレッチ', duration: 15, priority: 'mid', type: 'active', reason: '体をほぐそう' },
      { name: '好きな音楽を聴く', duration: 20, priority: 'low', type: 'sit', reason: '気分転換に' },
    ];
    extras.filter(t => !existingNames.has(t.name)).forEach(t => suggestions.push(t));
  }

  // Limit to top 5
  const top = suggestions.slice(0, 5);

  const subtitle = tasks.length === 0
    ? 'まだタスクがありません。まずはテンプレートから追加してみましょう！'
    : `今日は${tasks.length}個のタスク（${totalDur}分）。バランスを見ておすすめを提案します。`;

  document.getElementById('suggestSubtitle').textContent = subtitle;
  document.getElementById('suggestList').innerHTML = top.length
    ? top.map((t, i) => `
      <div class="suggest-item" onclick="addSuggestion(${i})">
        <span class="s-icon">${t.type === 'active' ? '🏃' : '📖'}</span>
        <div class="s-info">
          <span class="s-name">${esc(t.name)}</span>
          <span class="s-reason">${esc(t.reason)} · ${t.duration}分</span>
        </div>
        <button class="s-add">追加</button>
      </div>`).join('')
    : '<p style="text-align:center;color:var(--text-sub);font-size:13px;padding:16px;">全部やってる！すごい！</p>';

  window._suggestions = top;
  document.getElementById('suggestOverlay').classList.add('show');
}

function addSuggestion(idx) {
  const t = window._suggestions[idx];
  if (!t) return;
  const existingNames = new Set(tasks.map(t => t.name));
  if (existingNames.has(t.name)) return;
  tasks.push({ id: Date.now(), name: t.name, duration: t.duration, priority: t.priority, type: t.type });
  renderTasks();
  saveState();
  // Remove from list
  const el = document.querySelectorAll('.suggest-item')[idx];
  if (el) { el.style.opacity = '0.3'; el.style.pointerEvents = 'none'; }
}

function closeSuggest() {
  document.getElementById('suggestOverlay').classList.remove('show');
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  // Date
  const d = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('todayDate').textContent =
    `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;

  // Load saved state
  const saved = localStorage.getItem('daily-planner-state');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (s.date === toDateStr(d)) {
        tasks = s.tasks || [];
        schedule = s.schedule || [];
      }
      if (s.wakeTime) document.getElementById('wakeTime').value = s.wakeTime;
      if (s.sleepTime) document.getElementById('sleepTime').value = s.sleepTime;
    } catch(e) {}
  }
  const key = localStorage.getItem('daily-planner-apikey');
  if (key) document.getElementById('apiKeyInput').value = key;

  renderTasks();
  if (schedule.length) renderSchedule();
});

function toDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function saveState() {
  const d = new Date();
  localStorage.setItem('daily-planner-state', JSON.stringify({
    date: toDateStr(d),
    tasks, schedule,
    wakeTime: document.getElementById('wakeTime').value,
    sleepTime: document.getElementById('sleepTime').value
  }));
}

// ── Task Input ──
function addTask(e) {
  e.preventDefault();
  const name = document.getElementById('taskNameInput').value.trim();
  if (!name) return false;
  if (tasks.some(t => t.name === name)) {
    alert('同じ名前のタスクがあります');
    return false;
  }
  tasks.push({ id: Date.now(), name, duration: 60, priority: 'mid', type: 'active' });
  document.getElementById('taskNameInput').value = '';
  renderTasks();
  saveState();
  return false;
}

function removeTask(id, e) {
  if (e) e.stopPropagation();
  tasks = tasks.filter(t => t.id !== id);
  renderTasks();
  saveState();
}

function openTaskEdit(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingTaskId = id;
  document.getElementById('editTaskName').value = t.name;
  document.getElementById('editTaskDuration').value = t.duration;
  setEditType(t.type || 'sit');
  setEditPriority(t.priority);
  document.getElementById('taskEditOverlay').classList.add('show');
}

function closeTaskEdit() {
  document.getElementById('taskEditOverlay').classList.remove('show');
  editingTaskId = -1;
}

function setEditType(t) {
  editType = t;
  document.querySelectorAll('.task-edit-box .t-opt').forEach(el => {
    el.classList.toggle('active', el.dataset.t === t);
  });
}

function setEditPriority(p) {
  editPriority = p;
  document.querySelectorAll('.task-edit-box .p-opt').forEach(el => {
    el.classList.toggle('active', el.dataset.p === p);
  });
}

function saveTaskEdit() {
  const t = tasks.find(t => t.id === editingTaskId);
  if (!t) return;
  t.name = document.getElementById('editTaskName').value.trim() || t.name;
  t.duration = parseInt(document.getElementById('editTaskDuration').value) || 60;
  t.priority = editPriority;
  t.type = editType;
  renderTasks();
  saveState();
  closeTaskEdit();
}

const priorityLabels = { high: '高', mid: '中', low: '低' };

function renderTasks() {
  const el = document.getElementById('taskList');
  const genEl = document.getElementById('genButtons');
  if (!tasks.length) {
    el.innerHTML = '<div class="empty-state">タスクを追加してスケジュールを組みましょう</div>';
    genEl.style.display = 'none';
    return;
  }
  genEl.style.display = 'flex';
  el.innerHTML = tasks.map(t => `
    <div class="task-item" onclick="openTaskEdit(${t.id})">
      <div class="priority-dot ${t.priority}"></div>
      <span class="task-name">${esc(t.name)}</span>
      <div class="task-meta">
        <span class="type-badge ${t.type || 'sit'}">${t.type === 'active' ? '🏃' : '📖'}</span>
        <span class="task-time">${t.duration}分</span>
        <span class="task-priority-label ${t.priority}">${priorityLabels[t.priority]}</span>
      </div>
      <button class="delete-btn" onclick="removeTask(${t.id}, event)">×</button>
    </div>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Manual Schedule ──
function generateManual() {
  if (!tasks.length) return;
  const wake = parseTime(document.getElementById('wakeTime').value);
  const sleep = parseTime(document.getElementById('sleepTime').value);
  const totalAvailable = sleep - wake;

  // Sort by priority time slots: mid→morning, high→afternoon, low→evening
  // Then interleave active/sit types to avoid sitting too long
  const lowTasks = tasks.filter(t => t.priority === 'low');
  const midTasks = tasks.filter(t => t.priority === 'mid');
  const highTasks = tasks.filter(t => t.priority === 'high');
  const byPriority = [...midTasks, ...highTasks, ...lowTasks];

  // Interleave: alternate active and sit tasks
  const activeTasks = byPriority.filter(t => t.type === 'active');
  const sitTasks = byPriority.filter(t => t.type !== 'active');
  const sorted = [];
  let ai = 0, si = 0;
  // Start with active if available (get moving!)
  let wantActive = activeTasks.length > 0;
  while (ai < activeTasks.length || si < sitTasks.length) {
    if (wantActive && ai < activeTasks.length) {
      sorted.push(activeTasks[ai++]);
    } else if (!wantActive && si < sitTasks.length) {
      sorted.push(sitTasks[si++]);
    } else if (ai < activeTasks.length) {
      sorted.push(activeTasks[ai++]);
    } else {
      sorted.push(sitTasks[si++]);
    }
    wantActive = !wantActive;
  }

  // Calculate total task time
  const totalTask = sorted.reduce((s, t) => s + t.duration, 0);
  const breakCount = sorted.length - 1;
  const breakDuration = 10;
  const totalWithBreaks = totalTask + breakCount * breakDuration;

  // Calculate gap to distribute evenly across the day
  let gap = 0;
  if (totalWithBreaks < totalAvailable && sorted.length > 0) {
    // Extra free time to distribute as gaps between tasks
    const extraTime = totalAvailable - totalWithBreaks;
    // Distribute gaps: before first task, between tasks (already have breaks), after last
    // Use slots = tasks count + 1 (before first, after last, plus between)
    const slots = sorted.length + 1;
    gap = Math.floor(extraTime / slots);
  }

  // Meal times (prep + eating)
  const breakfastStart = wake; // 起床直後
  const lunchStart = 12 * 60; // 12:00
  const dinnerStart = 18 * 60 + 30; // 18:30
  const needBreakfast = wake < 10 * 60; // 10時前起床なら朝食あり
  const needLunch = wake < lunchStart && sleep > lunchStart + 60;
  const needDinner = wake < dinnerStart && sleep > dinnerStart + 60;

  schedule = [];
  let cursor = wake;

  // Insert breakfast (prep 15min + eat 15min = 30min)
  if (needBreakfast) {
    schedule.push({ name: '☀️ 朝食準備+朝食', duration: 30, priority: '', start: cursor, isBreak: true, isMeal: true });
    cursor += 30;
  }
  cursor += gap; // Initial gap after breakfast

  let lunchInserted = false, dinnerInserted = false;

  for (let i = 0; i < sorted.length; i++) {
    const t = sorted[i];

    // Insert lunch: when cursor reaches 11:30+ or task would overlap 12:00
    if (needLunch && !lunchInserted && (cursor >= lunchStart - 30 || cursor + t.duration > lunchStart)) {
      const lunchAt = Math.max(cursor, lunchStart);
      schedule.push({ name: '🍚 昼食準備+昼食', duration: 60, priority: '', start: lunchAt, isBreak: true, isMeal: true });
      cursor = lunchAt + 60;
      lunchInserted = true;
    }

    // Insert dinner: when cursor reaches 18:00+ or task would overlap 18:30
    if (needDinner && !dinnerInserted && (cursor >= dinnerStart - 30 || cursor + t.duration > dinnerStart)) {
      const dinnerAt = Math.max(cursor, dinnerStart);
      schedule.push({ name: '🌙 夕食準備+夕食', duration: 60, priority: '', start: dinnerAt, isBreak: true, isMeal: true });
      cursor = dinnerAt + 60;
      dinnerInserted = true;
    }

    if (cursor + t.duration > sleep) break;
    schedule.push({
      name: t.name, duration: t.duration, priority: t.priority,
      type: t.type || 'sit', start: cursor, isBreak: false
    });
    cursor += t.duration;

    // Add break + gap between tasks
    if (i < sorted.length - 1) {
      schedule.push({ name: '休憩', duration: breakDuration, priority: '', start: cursor, isBreak: true });
      cursor += breakDuration + gap;
    }
  }

  document.getElementById('aiNote').style.display = 'none';
  renderSchedule();
  saveState();
}

function parseTime(str) {
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}

function formatTime(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h + ':' + String(m).padStart(2, '0');
}

// ── AI Schedule ──
async function generateAI() {
  const key = localStorage.getItem('daily-planner-apikey');
  if (!key) {
    showSettings();
    return;
  }
  if (!tasks.length) return;

  const btn = document.getElementById('aiBtn');
  btn.disabled = true;
  btn.textContent = '考え中...';

  const wake = document.getElementById('wakeTime').value;
  const sleep = document.getElementById('sleepTime').value;
  const taskDesc = tasks.map(t =>
    `- ${t.name}（${t.duration}分、優先度:${t.priority === 'high' ? '高' : t.priority === 'mid' ? '中' : '低'}、タイプ:${t.type === 'active' ? '活動' : '座り'}）`
  ).join('\n');

  const taskShort = tasks.map(t =>
    `${t.name}|${t.duration}|${t.priority}|${t.type}`
  ).join('\n');

  const prompt = `タスクを最適な時間に配置して。起床${wake}〜就寝${sleep}。
ルール:午前=軽め(中),午後=重要(高),夜=楽しみ(低)。活動と座りを交互。
食事:朝食(起床後30分),昼食(12:00頃60分),夕食(18:30頃60分)を入れて。
夕食後〜就寝まで:リラックスタイムとして軽いタスクやお楽しみ(優先度低)を配置。空き時間を作りすぎない。
休憩はタスクの間に1つだけ(10分)。連続して休憩を入れない。就寝は入れない。所要時間は変えない。
全てのタスクを必ず配置すること。

タスク(名前|分|優先度|タイプ):
${taskShort}

以下の形式で1行1アイテム、他のテキスト不要:
NOTE:一言コメント
HH:MM|名前|分|priority|type|break
例:
NOTE:バランスよく配置しました
07:00|朝食|30|||1
07:30|掃除機|15|mid|active|0
07:45|休憩|10|||1
07:55|デュオリンゴ|15|high|sit|0
12:00|昼食|60|||1`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.7,
        max_tokens: 4096
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error: ${res.status}`);
    }

    const rawText = await res.text();
    let data;
    try {
      data = JSON.parse(rawText);
    } catch(jsonErr) {
      // API response itself is truncated - try to extract content
      const contentMatch = rawText.match(/"content"\s*:\s*"([\s\S]*?)(?:"|$)/);
      if (contentMatch) {
        data = { choices: [{ message: { content: contentMatch[1].replace(/\\n/g, '\n').replace(/\\"/g, '"') } }] };
      } else {
        throw new Error('APIレスポンスの読み取りに失敗しました');
      }
    }
    const text = data.choices?.[0]?.message?.content;
    if (!text) throw new Error('AIの応答が空でした');

    // Parse line-based response: HH:MM|name|duration|priority|type|break
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const noteMatch = lines.find(l => l.startsWith('NOTE:'));
    const aiNote = noteMatch ? noteMatch.slice(5).trim() : '';
    const parsed = [];
    const seenNames = new Set();
    let lastWasBreak = false;
    for (const line of lines) {
      const m = line.match(/^(\d{1,2}:\d{2})\|(.+?)\|(\d+)\|([^|]*)\|([^|]*)\|([01])$/);
      if (!m) continue;
      const isBreak = m[6] === '1';
      const name = m[2];
      // 就寝/起床 are allowed
      // Skip consecutive breaks
      if (isBreak && !/朝食|昼食|夕食/.test(name) && lastWasBreak) continue;
      // Skip duplicate non-break tasks
      if (!isBreak && seenNames.has(name)) continue;
      if (!isBreak) seenNames.add(name);
      lastWasBreak = isBreak;
      parsed.push({
        start: parseTime(m[1]),
        name,
        duration: parseInt(m[3]),
        priority: m[4] || '',
        type: m[5] || '',
        isBreak
      });
    }
    if (!parsed.length) throw new Error('AIの応答を解析できませんでした。もう一度お試しください。');
    schedule = parsed;

    const noteEl = document.getElementById('aiNote');
    if (aiNote) {
      noteEl.textContent = aiNote;
      noteEl.style.display = 'block';
    } else {
      noteEl.style.display = 'none';
    }

    renderSchedule();
    saveState();
  } catch (err) {
    alert('エラー: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'AIに提案してもらう';
  }
}

// ── Motivation Messages ──
function getMotivation(item, idx) {
  const hour = Math.floor(item.start / 60);
  const morningMsgs = [
    'サクッと終わらせてスッキリしよう!',
    'これが終わったら気持ちいい1日の始まり!',
    '朝やっておけば後がラク!',
    '体を動かして目を覚まそう!',
    '先にやれば残りの1日が自由!',
  ];
  const afternoonMsgs = [
    '午後のゴールデンタイム、集中!',
    'ここが今日のメインイベント!',
    '終わったら夜のお楽しみが待ってる!',
    'あと少しで自由時間!',
    '一番大事なことに全集中!',
  ];
  const eveningMsgs = [
    '今日もお疲れさま、ご褒美タイム!',
    'リラックスして楽しもう!',
    '好きなことをする時間!',
    '頑張った自分にご褒美!',
    '1日の締めくくりを楽しんで!',
  ];

  // Pick message based on time of day and use idx for variety
  if (hour < 12) return morningMsgs[idx % morningMsgs.length];
  if (hour < 18) return afternoonMsgs[idx % afternoonMsgs.length];
  return eveningMsgs[idx % eveningMsgs.length];
}

// ── Render Schedule ──
function renderSchedule() {
  const section = document.getElementById('scheduleSection');
  const el = document.getElementById('timeline');
  if (!schedule.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';

  // Current time in minutes
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  let nowInserted = false;

  let html = '';
  for (let i = 0; i < schedule.length; i++) {
    const item = schedule[i];
    // Insert "now" line before this item if current time is before this item's start
    if (!nowInserted && nowMins < item.start) {
      html += `<div class="timeline-now"><span class="now-time">${formatTime(nowMins)}</span><div class="now-dot"></div><div class="now-line"></div></div>`;
      nowInserted = true;
    }
    // Insert "now" line during this item (between start and end)
    if (!nowInserted && nowMins >= item.start && nowMins < item.start + item.duration) {
      // Render item first, then now line after
    }

    const mot = !item.isBreak ? getMotivation(item, i) : '';
    html += `
    <div class="timeline-item"
         draggable="${!item.isBreak}"
         data-idx="${i}"
         ondragstart="onDragStart(event,${i})"
         ondragover="onDragOver(event,${i})"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event,${i})"
         ontouchstart="onTouchStart(event,${i})"
         ontouchmove="onTouchMove(event,${i})"
         ontouchend="onTouchEnd(event,${i})">
      <div class="timeline-time" onclick="openTimeEdit(${i})">${formatTime(item.start)}</div>
      <div class="timeline-card${item.isBreak && /朝食|昼食|夕食/.test(item.name) ? ' break-card meal-card' : item.isBreak ? ' break-card' : ''}${item.done ? ' done' : ''}">
        ${!item.isBreak ? `<div class="tl-check${item.done ? ' checked' : ''}" onclick="toggleDone(${i}, event)">${item.done ? '✓' : ''}</div>` : ''}
        ${!item.isBreak ? `<span class="type-icon">${item.type === 'active' ? '🏃' : '📖'}</span>` : ''}
        ${item.priority ? `<div class="priority-dot ${item.priority}"></div>` : ''}
        <div style="flex:1">
          <span class="tl-name">${esc(item.name)}</span>
          ${mot ? `<span class="tl-motivation">${mot}</span>` : ''}
        </div>
        <span class="tl-duration">${item.duration}分</span>
      </div>
    </div>`;

    // Insert now line after current item if time falls within it
    if (!nowInserted && nowMins >= item.start && nowMins < item.start + item.duration) {
      html += `<div class="timeline-now"><span class="now-time">${formatTime(nowMins)}</span><div class="now-dot"></div><div class="now-line"></div></div>`;
      nowInserted = true;
    }
  }

  // Now line after all items
  if (!nowInserted && schedule.length) {
    const last = schedule[schedule.length - 1];
    if (nowMins <= last.start + last.duration + 60) {
      html += `<div class="timeline-now"><span class="now-time">${formatTime(nowMins)}</span><div class="now-dot"></div><div class="now-line"></div></div>`;
    }
  }

  // End time
  if (schedule.length) {
    const last = schedule[schedule.length - 1];
    html += `
      <div class="timeline-end">
        <div class="timeline-time">${formatTime(last.start + last.duration)}</div>
        <div class="end-label">終了</div>
      </div>`;
  }
  el.innerHTML = html;
}

// ── Drag & Drop (Desktop) ──
let dragIdx = -1;
function onDragStart(e, idx) {
  if (schedule[idx].isBreak) { e.preventDefault(); return; }
  dragIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e, idx) {
  e.preventDefault();
  if (dragIdx === idx || schedule[idx].isBreak) return;
  document.querySelectorAll('.timeline-item').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, idx) {
  e.preventDefault();
  document.querySelectorAll('.timeline-item').forEach(el => {
    el.classList.remove('drag-over','dragging');
  });
  if (dragIdx === idx || dragIdx < 0) return;
  reorderSchedule(dragIdx, idx);
  dragIdx = -1;
}

// ── Touch Drag (Mobile) - Long press to activate ──
let touchDragIdx = -1;
let touchStartY = 0;
let touchLongPressTimer = null;
let touchDragActive = false;
function onTouchStart(e, idx) {
  if (schedule[idx].isBreak) return;
  touchDragIdx = idx;
  touchStartY = e.touches[0].clientY;
  touchDragActive = false;
  // Start long press timer (500ms)
  touchLongPressTimer = setTimeout(() => {
    touchDragActive = true;
    const el = e.currentTarget || document.querySelector(`.timeline-item[data-idx="${idx}"]`);
    if (el) el.classList.add('dragging');
    // Haptic feedback if available
    if (navigator.vibrate) navigator.vibrate(30);
  }, 500);
}
function onTouchMove(e, idx) {
  if (touchDragIdx < 0) return;
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  // Cancel long press if moved before activation
  if (!touchDragActive && dy > 10) {
    clearTimeout(touchLongPressTimer);
    touchDragIdx = -1;
    return;
  }
  if (!touchDragActive) return;
  e.preventDefault();
  // Highlight drop target
  const touch = e.touches[0];
  const items = document.querySelectorAll('.timeline-item');
  items.forEach(item => item.classList.remove('drag-over'));
  for (const item of items) {
    const rect = item.getBoundingClientRect();
    if (touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
      const targetIdx = parseInt(item.dataset.idx);
      if (targetIdx !== touchDragIdx && !schedule[targetIdx].isBreak) {
        item.classList.add('drag-over');
      }
      break;
    }
  }
}
function onTouchEnd(e, idx) {
  clearTimeout(touchLongPressTimer);
  if (touchDragIdx < 0 || !touchDragActive) {
    touchDragIdx = -1;
    touchDragActive = false;
    return;
  }
  document.querySelectorAll('.timeline-item').forEach(el => {
    el.classList.remove('dragging','drag-over');
  });
  // Find drop target
  const touch = e.changedTouches[0];
  const items = document.querySelectorAll('.timeline-item');
  for (const item of items) {
    const rect = item.getBoundingClientRect();
    if (touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
      const targetIdx = parseInt(item.dataset.idx);
      if (targetIdx !== touchDragIdx && !schedule[targetIdx].isBreak) {
        reorderSchedule(touchDragIdx, targetIdx);
      }
      break;
    }
  }
  touchDragIdx = -1;
  touchDragActive = false;
}

function reorderSchedule(fromIdx, toIdx) {
  // Remove breaks, reorder tasks, re-insert breaks
  const taskItems = schedule.filter(s => !s.isBreak);
  const breakItems = schedule.filter(s => s.isBreak && s.name !== '休憩');

  // Find the actual task indices
  let fromTask = -1, toTask = -1, ti = 0;
  for (let i = 0; i < schedule.length; i++) {
    if (!schedule[i].isBreak) {
      if (i === fromIdx) fromTask = ti;
      if (i === toIdx) toTask = ti;
      ti++;
    }
  }
  if (fromTask < 0) fromTask = 0;
  if (toTask < 0) toTask = taskItems.length - 1;

  const [moved] = taskItems.splice(fromTask, 1);
  taskItems.splice(toTask, 0, moved);

  // Rebuild with breaks
  const wake = parseTime(document.getElementById('wakeTime').value);
  const sleep = parseTime(document.getElementById('sleepTime').value);
  schedule = [];
  let cursor = schedule.length ? schedule[0].start : wake;
  // Use earliest start from existing or wake
  cursor = wake;

  for (let i = 0; i < taskItems.length; i++) {
    // Re-insert special breaks (lunch etc.)
    for (const br of breakItems) {
      if (br.start <= cursor + taskItems[i].duration && br.start >= cursor) {
        schedule.push({ ...br, start: cursor });
        cursor += br.duration;
      }
    }
    taskItems[i].start = cursor;
    schedule.push(taskItems[i]);
    cursor += taskItems[i].duration;
    // Add regular break
    if (i < taskItems.length - 1 && cursor + 10 <= sleep) {
      schedule.push({ name: '休憩', duration: 10, priority: '', start: cursor, isBreak: true });
      cursor += 10;
    }
  }

  renderSchedule();
  saveState();
}

// ── Check Done ──
function toggleDone(idx, e) {
  e.stopPropagation();
  schedule[idx].done = !schedule[idx].done;
  renderSchedule();
  saveState();
}

// ── Time Edit ──
function openTimeEdit(idx) {
  editingScheduleIdx = idx;
  document.getElementById('timeEditInput').value = formatTime(schedule[idx].start);
  document.getElementById('timeEditPopup').classList.add('show');
}
function closeTimeEdit() {
  document.getElementById('timeEditPopup').classList.remove('show');
  editingScheduleIdx = -1;
}
function saveTimeEdit() {
  if (editingScheduleIdx < 0) return;
  const newStart = parseTime(document.getElementById('timeEditInput').value);
  const diff = newStart - schedule[editingScheduleIdx].start;
  // Shift this and all subsequent items
  for (let i = editingScheduleIdx; i < schedule.length; i++) {
    schedule[i].start += diff;
  }
  renderSchedule();
  saveState();
  closeTimeEdit();
}

// ── Schedule Clear ──
function clearSchedule() {
  schedule = [];
  document.getElementById('scheduleSection').style.display = 'none';
  document.getElementById('aiNote').style.display = 'none';
  saveState();
}

// ── Settings ──
function showSettings() {
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}
function saveSettings() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) {
    localStorage.setItem('daily-planner-apikey', key);
  } else {
    localStorage.removeItem('daily-planner-apikey');
  }
  closeSettings();
}

// Save time range changes
document.getElementById('wakeTime').addEventListener('change', saveState);
document.getElementById('sleepTime').addEventListener('change', saveState);
