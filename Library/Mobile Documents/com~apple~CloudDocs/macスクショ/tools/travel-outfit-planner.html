<script>
// ============ Firebase Setup ============
const firebaseConfig = {
  apiKey: "AIzaSyDsIEl76iezrPX7S1MuFt_uW8dn-GIpipc",
  authDomain: "travel-outfit-planner-cf255.firebaseapp.com",
  databaseURL: "https://travel-outfit-planner-cf255-default-rtdb.firebaseio.com",
  projectId: "travel-outfit-planner-cf255",
  storageBucket: "travel-outfit-planner-cf255.firebasestorage.app",
  messagingSenderId: "1015256292582",
  appId: "1:1015256292582:web:342b95c862bb719fe4ef27"
};
firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();
const auth = firebase.auth();

let roomCode = null; // current room code
let roomRef = null;  // firebase ref for current room

// ============ Firebase Data Layer ============
// Wraps Firebase RTDB to provide simple async CRUD like the old Dexie API
const db = {
  plans: {
    async get(id) { const s = await roomRef.child('plan').once('value'); return s.val(); },
    async update(id, data) { await roomRef.child('plan').update(data); },
    async toArray() { const p = await roomRef.child('plan').once('value'); return p.val() ? [p.val()] : []; }
  },
  cells: {
    async where(query) {
      const snap = await roomRef.child('cells').once('value');
      const all = [];
      snap.forEach(c => { all.push({ id: c.key, ...c.val() }); });
      if (typeof query === 'string') {
        const field = query;
        return {
          equals: (val) => ({
            toArray: () => all.filter(i => i[field] === val),
            async delete() { for (const i of all.filter(x => x[field] === val)) await roomRef.child('cells/' + i.id).remove(); }
          })
        };
      }
      const filtered = all.filter(item => {
        return Object.keys(query).every(k => item[k] === query[k] || (k === 'planId' && true));
      });
      return {
        toArray: () => filtered,
        first: () => filtered[0] || null,
        async delete() { for (const i of filtered) await roomRef.child('cells/' + i.id).remove(); }
      };
    },
    async add(data) { const ref = roomRef.child('cells').push(); await ref.set(data); return ref.key; },
    async get(id) { const s = await roomRef.child('cells/' + id).once('value'); return s.val() ? { id, ...s.val() } : null; },
    async update(id, data) { await roomRef.child('cells/' + id).update(data); },
    async delete(id) { await roomRef.child('cells/' + id).remove(); }
  },
  packingItems: {
    async where(query) {
      const snap = await roomRef.child('packingItems').once('value');
      const all = [];
      snap.forEach(c => { all.push({ id: c.key, ...c.val() }); });
      let filtered;
      if (typeof query === 'string') {
        // where('field').equals(val) pattern - return chainable
        const field = query;
        return {
          equals: (val) => ({
            toArray: () => all.filter(i => i[field] === val),
            async delete() { for (const i of all.filter(x => x[field] === val)) await roomRef.child('packingItems/' + i.id).remove(); }
          })
        };
      }
      filtered = all.filter(item => {
        return Object.keys(query).every(k => {
          if (k === 'planId') return true;
          return item[k] === query[k];
        });
      });
      return {
        toArray: () => filtered,
        first: () => filtered[0] || null,
        filter: (fn) => ({ toArray: () => filtered.filter(fn) }),
        async delete() { for (const i of filtered) await roomRef.child('packingItems/' + i.id).remove(); }
      };
    },
    async add(data) { const ref = roomRef.child('packingItems').push(); await ref.set(data); return ref.key; },
    async bulkAdd(items) { for (const item of items) await this.add(item); },
    async get(id) { const s = await roomRef.child('packingItems/' + id).once('value'); return s.val() ? { id, ...s.val() } : null; },
    async update(id, data) { await roomRef.child('packingItems/' + id).update(data); },
    async delete(id) { await roomRef.child('packingItems/' + id).remove(); },
    async bulkDelete(ids) { for (const id of ids) await this.delete(id); }
  }
};

const CATEGORIES = [
  { key: 'accessory', label: 'その他', color: '#e67e22' },
  { key: 'top', label: '上', color: '#5a9fc4' },
  { key: 'bottom', label: '下', color: '#2ecc71' },
  { key: 'shoes', label: '靴', color: '#9b59b6' }
];

let currentPlanId = 1;
let currentPlan = null;

// Helper: get all items from a collection
async function getAllCells() {
  if (_cachedCells) return _cachedCells;
  if (!roomRef) return [];
  const snap = await roomRef.child('cells').once('value');
  const all = [];
  snap.forEach(c => { all.push({ id: c.key, ...c.val() }); });
  _cachedCells = all;
  return all;
}
async function getCellByDayCategory(day, category) {
  const all = await getAllCells();
  return all.find(c => c.day === day && c.category === category && (!c.member || c.member === currentMember)) || null;
}
async function upsertCell(day, category, data) {
  let cell = await getCellByDayCategory(day, category);
  if (cell) {
    await roomRef.child('cells').child(cell.id).update(data);
    return { ...cell, ...data };
  } else {
    const newData = { planId: currentPlanId, day, category, member: currentMember, images: [], memo: '', comments: [], ...data };
    const ref = await roomRef.child('cells').push(newData);
    return { id: ref.key, ...newData };
  }
}
async function getAllPackingItems() {
  if (_cachedPackingItems) return _cachedPackingItems;
  if (!roomRef) return [];
  const snap = await roomRef.child('packingItems').once('value');
  const all = [];
  snap.forEach(c => { all.push({ id: c.key, ...c.val() }); });
  _cachedPackingItems = all;
  return all;
}
async function getRoomMembers() {
  if (_cachedMembers && _cachedMembers.length > 0) return _cachedMembers;
  if (!roomRef) return ['自分'];
  const snap = await roomRef.child('members').once('value');
  const members = snap.val();
  if (!members || Object.keys(members).length === 0) return ['自分'];
  _cachedMembers = Object.values(members).sort((a, b) => a.order - b.order).map(m => m.name);
  return _cachedMembers;
}
async function addRoomMember(name) {
  if (!roomRef || !name) return;
  const existing = await getRoomMembers();
  if (existing.includes(name)) return;
  await roomRef.child('members').push({ name: name, order: existing.length });
}
async function removeRoomMember(name) {
  if (!roomRef) return;
  const snap = await roomRef.child('members').once('value');
  snap.forEach(c => { if (c.val().name === name) roomRef.child('members').child(c.key).remove(); });
}
async function renameRoomMember(oldName, newName) {
  if (!roomRef) return;
  const snap = await roomRef.child('members').once('value');
  snap.forEach(c => { if (c.val().name === oldName) roomRef.child('members').child(c.key).update({ name: newName }); });
}

// ============ Init ============
async function init() {
  // Render welcome immediately so the UI is never blank, even if Firebase hangs
  showWelcome();

  try {
    // Sign in anonymously (with timeout so the preview/offline doesn't freeze)
    await Promise.race([
      auth.signInAnonymously(),
      new Promise((_, reject) => setTimeout(() => reject(new Error('Auth timeout')), 5000))
    ]);
  } catch(e) {
    console.error('Auth error:', e);
  }

  // Check URL for room code
  const params = new URLSearchParams(location.search);
  const urlRoom = params.get('room');
  const savedRoom = localStorage.getItem('roomCode');

  try {
    if (urlRoom) {
      await joinRoom(urlRoom);
      const myName = localStorage.getItem('myMemberName');
      if (myName) {
        await autoAddMember(myName);
      } else {
        showNamePrompt(urlRoom);
      }
    } else if (savedRoom) {
      await joinRoom(savedRoom);
      const myName = localStorage.getItem('myMemberName');
      if (myName) await autoAddMember(myName);
    }
    // else: welcome is already shown
  } catch(e) {
    console.error('Init error:', e);
    showWelcome();
  }
}

// ---- Room History ----
function getRoomHistory() {
  return JSON.parse(localStorage.getItem('roomHistory') || '[]');
}
function saveRoomToHistory(code, planName, startDate, days) {
  let history = getRoomHistory();
  history = history.filter(h => h.code !== code);
  history.unshift({ code, name: planName || '未設定', startDate: startDate || '', days: days || 0, updatedAt: new Date().toISOString() });
  // Keep max 10
  if (history.length > 10) history = history.slice(0, 10);
  localStorage.setItem('roomHistory', JSON.stringify(history));
}
function removeRoomFromHistory(code) {
  let history = getRoomHistory().filter(h => h.code !== code);
  localStorage.setItem('roomHistory', JSON.stringify(history));
}

async function autoAddMember(name) {
  if (!roomRef || !name) return;
  const members = await getRoomMembers();

    ]},

    ]},

    ]}
  ];

        name: item.name, checked: false, important: item.important || false, note: '', parentId: null, sortOrder: order++
      });

  renderGrid();
  renderPackingList();
}

function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

async function createRoom() {
  roomCode = generateRoomCode();
  roomRef = rtdb.ref('rooms/' + roomCode);
  localStorage.setItem('roomCode', roomCode);
  // Set up real-time listener
  setupRealtimeListener();
  return roomCode;
}

async function joinRoom(code, opts) {
  opts = opts || {};
  try {
    code = code.toUpperCase().trim();
    roomCode = code;
    roomRef = rtdb.ref('rooms/' + roomCode);
    localStorage.setItem('roomCode', roomCode);

    // Check if room has a plan (with timeout so the preview doesn't hang)
    const planSnap = await Promise.race([
      roomRef.child('plan').once('value'),
      new Promise((_, reject) => setTimeout(() => reject(new Error('Plan fetch timeout')), 6000))
    ]);

    // Clean up _temp items
    const allSnap = await roomRef.child('packingItems').once('value');
    if (allSnap.val()) {
      allSnap.forEach(c => {
        const v = c.val();
        if (v && (v.category === '_temp' || v.name === '_temp')) {
          roomRef.child('packingItems/' + c.key).remove();
        }
      });
    }

    if (planSnap.val() && planSnap.val().name) {
      currentPlan = planSnap.val();
      setupRealtimeListener();
      renderHeader();
      renderGrid();
      renderPackingList();
    } else if (opts.userInitiated) {
      // User explicitly tried to join — let them create a plan
      setupRealtimeListener();
      showSettings();
    } else {
      // Auto-rejoin to a stale/empty room — stay on welcome
      localStorage.removeItem('roomCode');
      roomRef = null;
      roomCode = null;
      showWelcome();
    }
  } catch(e) {
    console.error('joinRoom error:', e);
    localStorage.removeItem('roomCode');
    roomRef = null;
    roomCode = null;
    showWelcome();
  }
}

let _cachedPackingItems = null;
let _cachedMembers = null;
let _cachedCells = null;

function setupRealtimeListener() {
  // Listen for plan changes
  roomRef.child('plan').on('value', (snap) => {
    if (snap.val()) {
      currentPlan = snap.val();
      renderHeader();
      renderGrid();
    }
  });
  // Listen for cell changes - cache locally
  roomRef.child('cells').on('value', (snap) => {
    const all = [];
    if (snap.val()) snap.forEach(c => { all.push({ id: c.key, ...c.val() }); });
    _cachedCells = all;
    renderGrid();
  });
  // Listen for packing item changes - cache locally
  roomRef.child('packingItems').on('value', (snap) => {
    const all = [];
    if (snap.val()) snap.forEach(c => { all.push({ id: c.key, ...c.val() }); });
    _cachedPackingItems = all;
    renderPackingList();
  });
  // Listen for member changes - cache locally
  roomRef.child('members').on('value', (snap) => {
    const members = snap.val();
    if (members) {
      _cachedMembers = Object.values(members).sort((a, b) => a.order - b.order).map(m => m.name);
    } else {
      _cachedMembers = [];
    }
    renderPackingList();
    renderGrid();
  });
}

function copyTextToClipboard(text, successMsg) {
  // Use a hidden textarea for reliable copying
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    alert(successMsg || 'コピーしました！');
  } catch(e) {
    prompt('コピーしてください:', text);
  }
  document.body.removeChild(ta);
}

let currentDay = 0;

async function renderGrid() {
  if (!currentPlan) return;
  if (currentDay >= currentPlan.days) currentDay = 0;

  // Get members from dedicated members list in Firebase
  const outfitMembers = await getRoomMembers();
  if (!currentMember || !outfitMembers.includes(currentMember)) {
    currentMember = outfitMembers[0];
  }

  const cells = await getAllCells();
  const cellMap = {};
  cells.forEach(c => {
    // Support both old (no member) and new (with member) format
    const memberMatch = !c.member || c.member === currentMember;
    if (memberMatch) cellMap[`${c.day}-${c.category}`] = c;
  });

  const start = new Date(currentPlan.startDate);
  const dayNames = ['日','月','火','水','木','金','土'];

  // ---- Day Tabs ----
  let tabsHtml = '';
  for (let d = 0; d < currentPlan.days; d++) {
    const date = new Date(start);
    date.setDate(date.getDate() + d);
    const dayName = dayNames[date.getDay()];
    const dayColor = date.getDay() === 0 ? '#d96b6b' : date.getDay() === 6 ? '#5a9fc4' : '';
    const isActive = d === currentDay;
    const dateColor = dayColor || '#333';
    const borderColor = isActive ? '#d4a017' : 'transparent';
    tabsHtml += `<div class="day-tab ${isActive ? 'active' : ''}" onclick="switchDay(${d})" style="border-bottom-color:${borderColor}">
      <div style="font-size:.85rem;color:${dateColor}">${date.getMonth()+1}/${date.getDate()}</div>
      <div style="font-size:.7rem;font-weight:700;letter-spacing:1px;color:${dateColor}">(${dayName})</div>
      <div class="day-num">${d+1}日目</div>
    </div>`;
  }
  document.getElementById('dayTabs').innerHTML = ''; // Grid view has dates in table header

  // ---- Modern Grid View ----
  const catIcons = { accessory: '🧥', top: '👚', bottom: '👖', shoes: '👟' };
  const days = currentPlan.days;
  const GRID_CATS = [...CATEGORIES, { key: 'memo', label: 'メモ', color: '#999' }];
  // Calculate row height to fill screen dynamically
  const headerEl = document.getElementById('headerBar');
  const tabBarEl = document.getElementById('bottomTabBar');
  const headerH = headerEl ? headerEl.offsetHeight : 80;
  const tabBarH = tabBarEl ? tabBarEl.offsetHeight : 50;
  const memberTabH = 48;
  const dateRowH = 76;
  const memoRowH = 40;
  const gap = 3;
  const totalGaps = gap * (GRID_CATS.length + 1);
  const availH = window.innerHeight - headerH - memberTabH - dateRowH - tabBarH - totalGaps - memoRowH - 8;
  const catRowH = Math.max(Math.floor(availH / CATEGORIES.length), 60);

  // Member tabs
  let outfitMemberTabs = outfitMembers.map(m => {
    const mc = getMemberColor(outfitMembers, m);
    const isActive = m === currentMember;
    const style = isActive ? `border-color:${mc.border};background:${mc.bg};color:${mc.text}` : '';
    return `<div class="member-tab ${isActive ? 'active' : ''}" onclick="switchOutfitMember('${escapeHtml(m)}')" data-member="${escapeHtml(m)}" style="${style}"><span onclick="event.stopPropagation();showEditMemberModal('${escapeHtml(m)}')" style="margin-right:4px;font-size:12px;opacity:0.5">✏️</span>${escapeHtml(m)}</div>`;
  }).join('');
  outfitMemberTabs += `<div class="member-tab add-tab" onclick="showAddOutfitMemberModal()">+ 追加</div>`;

  // Calculate cell width to fit screen perfectly
  const screenW = window.innerWidth;
  const margin = 6; // each side
  const labelW = 36;
  const colTotalGaps = gap * (days);
  const cellW = Math.floor((screenW - margin * 2 - labelW - colTotalGaps) / days);

  const outfitMC = getMemberColor(outfitMembers, currentMember);

  let cardHtml = `<div style="margin:0 ${margin}px 8px">
    <div class="member-tabs" style="margin-bottom:10px">${outfitMemberTabs}</div>`;

  // Date header row - use same flex layout as category rows
  cardHtml += `<div style="display:flex;gap:${gap}px;margin-bottom:${gap}px">`;
  cardHtml += `<div style="width:${labelW}px;flex-shrink:0"></div>`;
  for (let d = 0; d < days; d++) {
    const date = new Date(start);
    date.setDate(date.getDate() + d);
    const dow = dayNames[date.getDay()];
    const dayColor = date.getDay() === 0 ? '#d96b6b' : date.getDay() === 6 ? '#5a9fc4' : '#444';
    const tempVal = (currentPlan.temps && currentPlan.temps[d]) || '';
    const isActive = d === currentDay;
    const hdBg = isActive ? outfitMC.bg : '#fff';
    const hdShadow = isActive ? 'box-shadow:0 0 0 2px ' + outfitMC.border : '';
    cardHtml += `<div onclick="switchDay(${d})" style="flex:1;min-width:0;text-align:center;cursor:pointer;padding:6px 2px;border-radius:10px;background:${hdBg};${hdShadow}">
      <div style="color:${dayColor};font-size:1rem;font-weight:800">${date.getMonth()+1}/${date.getDate()}</div>
      <div style="color:${dayColor};font-size:.8rem;font-weight:600">(${dow})</div>
      <div style="font-size:.7rem;color:#bbb;margin-top:1px">${d+1}日目</div>
      ${tempVal ? `<div style="font-size:.7rem;color:#e67e22;font-weight:600">${escapeHtml(tempVal)}</div>` : ''}
    </div>`;
  }
  cardHtml += `</div>`;

  // Category rows
  for (const cat of GRID_CATS) {
    const icon = catIcons[cat.key] || '📝';
    const isMemo = cat.key === 'memo';

    cardHtml += `<div style="display:flex;gap:${gap}px;margin-bottom:${gap}px">`;

    // Left label
    cardHtml += `<div style="width:${labelW}px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 0">
      <span style="font-size:1.1rem">${icon}</span>
      <span style="font-size:.7rem;font-weight:700;color:#888;letter-spacing:1px">${cat.label}</span>
    </div>`;

    for (let d = 0; d < days; d++) {
      const cell = isMemo ? cellMap[`${d}-memo`] : cellMap[`${d}-${cat.key}`];
      const hasContent = isMemo ? !!(cell?.memo) : !!(cell && (cell.images?.length || cell.memo));
      const isActive = d === currentDay;

      const cellBg = isActive ? outfitMC.bg : '#fff';
      const cellClick = isMemo ? `editDayMemo(${d})` : (hasContent ? `editCell(${d},'${cat.key}')` : `directAddPhoto(${d},'${cat.key}')`);

      const hasImages = !isMemo && hasContent && cell.images && cell.images.length > 0;
      const textOnly = !isMemo && hasContent && !hasImages && cell.memo;
      const centerContent = isMemo || textOnly || !hasContent;

      const rowH = isMemo ? memoRowH : catRowH;
      const heightStyle = isMemo ? `min-height:${memoRowH}px` : `min-height:${rowH}px`;
      cardHtml += `<div onclick="${cellClick}" style="flex:1;min-width:0;background:${cellBg};border-radius:8px;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:${centerContent ? 'center' : 'flex-start'};${heightStyle};padding:2px;transition:transform .1s" ontouchstart="this.style.transform='scale(0.96)'" ontouchend="this.style.transform=''">`;

      if (isMemo) {
        const memo = cell?.memo || '';
        if (memo) {
          cardHtml += `<div style="font-size:.75rem;color:#555;word-break:break-all;white-space:pre-wrap;text-align:center;padding:2px;font-weight:600">${escapeHtml(memo)}</div>`;
        } else {
          cardHtml += `<span style="font-size:.7rem;color:#ccc">メモ</span>`;
        }
      } else if (hasContent) {
        const hasMemo = !!(cell.memo);
        const imgMaxH = hasMemo ? Math.max(catRowH - 22, 50) : (catRowH - 6);
        if (hasImages) {
          for (const img of cell.images) {
            cardHtml += `<img src="${img}" style="width:100%;max-height:${imgMaxH}px;object-fit:contain;border-radius:6px;display:block" />`;
          }
        }
        if (hasMemo && !hasImages) {
          // テキストのみ: 中央表示、セル高さに合わせてフォント自動縮小
          const memoLen = cell.memo.length;
          // セル高さから逆算して収まるフォントサイズを推定
          const maxCharsPerLine = Math.floor(cellW / 10);
          const lines = Math.ceil(memoLen / Math.max(maxCharsPerLine, 1));
          const availH = catRowH - 8;
          const idealLineH = Math.floor(availH / Math.max(lines, 1));
          const fs = Math.min(Math.max(idealLineH * 0.7, 8), 13);
          cardHtml += `<div style="font-size:${fs}px;color:#555;text-align:center;word-break:break-all;white-space:pre-wrap;padding:2px 3px;font-weight:600;line-height:1.3;display:flex;align-items:center;justify-content:center;flex:1;width:100%">${escapeHtml(cell.memo)}</div>`;
        } else if (hasMemo && hasImages) {
          cardHtml += `<div style="font-size:.55rem;color:#555;text-align:center;word-break:break-all;padding:0 2px;font-weight:600;line-height:1.1;overflow:hidden;max-height:16px">${escapeHtml(cell.memo)}</div>`;
        }
      } else {
        cardHtml += `<div style="flex:1;display:flex;align-items:center;justify-content:center;opacity:.15"><span style="font-size:1.5rem">${icon}</span></div>`;
      }

      cardHtml += `</div>`;
    }
    cardHtml += `</div>`;
  }

  cardHtml += `</div>`;
  document.getElementById('dayCard').innerHTML = cardHtml;

  // Swipe gesture for day switching
  initDaySwipe();

  // ---- Export Grid (hidden) ----
  renderExportGrid(cellMap, start, dayNames);
  // Re-apply tab visibility
  applyTabState();
}

function renderExportGrid(cellMap, start, dayNames) {

  let html = `<div id="exportTarget" class="grid-table" style="grid-template-columns: 30px repeat(${currentPlan.days}, minmax(90px, 1fr)); grid-template-rows: auto repeat(${CATEGORIES.length}, auto); width: ${30 + currentPlan.days * 150}px;">`;

  for (let d = 0; d < currentPlan.days; d++) {
    const date = new Date(start);
    date.setDate(date.getDate() + d);
    const dayName = dayNames[date.getDay()];
    const dayColor = date.getDay() === 0 ? '#d96b6b' : date.getDay() === 6 ? '#5a9fc4' : '#333';
    const tempVal = (currentPlan.temps && currentPlan.temps[d]) || '';
    html += `<div class="grid-cell" style="font-weight:700;text-align:center;padding:6px;background:#e8e0d8;">
      <div style="color:${dayColor}">${date.getMonth()+1}/${date.getDate()}(${dayName})</div>

      ${tempVal ? `<div style="font-size:.75rem;color:#e67e22">${escapeHtml(tempVal)}</div>` : ''}

  for (const cat of CATEGORIES) {
    html += `<div class="grid-cell" style="display:flex;align-items:center;justify-content:center;background:#f9f6f3;font-weight:700;font-size:.8rem;color:#555;writing-mode:vertical-rl">${cat.label}</div>`;

let swipeHandlerAttached = false;
function initDaySwipe() {
  const el = document.getElementById('dayCard');
  if (!el || !currentPlan || swipeHandlerAttached) return;
  swipeHandlerAttached = true;
  let startX = 0, startY = 0, swiping = false;
  document.addEventListener('touchstart', e => {
    const card = document.getElementById('dayCard');
    if (!card || !card.contains(e.target)) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!swiping) return;
    swiping = false;
    if (!currentPlan) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0 && currentDay < currentPlan.days - 1) {
        switchDay(currentDay + 1);
      } else if (dx > 0 && currentDay > 0) {
        switchDay(currentDay - 1);
      }
    }
  }, { passive: true });
}

// ============ Image Compression ============
function compressImage(file, maxWidth = 400) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ratio = Math.min(maxWidth / img.width, maxWidth / img.height, 1);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

    for (let d = 0; d < days; d++) {
      const date = new Date(start); date.setDate(date.getDate() + d);
      const dow = dayNames[date.getDay()];
      const dayColor = date.getDay() === 0 ? '#d96b6b' : date.getDay() === 6 ? '#5a9fc4' : '#333';
      const tempVal = (currentPlan.temps && currentPlan.temps[d]) || '';
      html += `<th style="width:${colW}px;background:#e8e0d8;border:1px solid #ddd;padding:8px;text-align:center">
        <div style="color:${dayColor};font-size:14px">${date.getMonth()+1}/${date.getDate()}(${dow})</div>
        <div style="font-size:11px;color:#999">${d+1}日目</div>
        ${tempVal ? `<div style="font-size:12px;color:#e67e22">${escapeHtml(tempVal)}</div>` : ''}
      </th>`;
    }
    html += `</tr>`;

    // Category rows
    const CATS = [
      { key: 'accessory', label: 'その他' },
      { key: 'top', label: '上' },
      { key: 'bottom', label: '下' },
      { key: 'shoes', label: '靴' }
    ];
    for (const cat of CATS) {
      html += `<tr><td style="background:#f9f6f3;border:1px solid #ddd;text-align:center;font-weight:700;font-size:13px;color:#555;padding:6px;writing-mode:vertical-rl">${cat.label}</td>`;
      for (let d = 0; d < days; d++) {
        const cell = cellMap[`${d}-${cat.key}`];
        html += `<td style="border:1px solid #ddd;padding:6px;text-align:center;vertical-align:top">`;
        if (cell && cell.images && cell.images.length > 0) {
          for (const img of cell.images) {
            html += `<img src="${img}" style="max-width:${colW - 16}px;max-height:140px;object-fit:contain;border-radius:4px;margin:2px 0" />`;
          }
        }
        if (cell && cell.memo) {
          html += `<div style="font-size:11px;color:#666;margin-top:4px">${escapeHtml(cell.memo)}</div>`;
        }
        html += `</td>`;
      }
      html += `</tr>`;
    }
    html += `</table>`;

    wrapper.innerHTML = html;
    document.body.appendChild(wrapper);

    const canvas = await html2canvas(wrapper, {
      backgroundColor: '#ffffff',
      scale: 2,
      useCORS: true,
      allowTaint: true
    });

    document.body.removeChild(wrapper);

    const link = document.createElement('a');
    link.download = `${currentPlan.name}_コーデ.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    closeModal();
  } catch (err) {
    closeModal();
    alert('画像の生成に失敗しました: ' + err.message);
  }
}

// ============ Export as Text ============
async function exportAsText() {
  if (!currentPlan) return;
  closeModal();
  const allItems = await getAllPackingItems();
  const allCells = await getAllCells();
  const start = new Date(currentPlan.startDate);
  const days = currentPlan.days;
  const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
  const categories = ['その他', '上', '下', '靴'];

  let text = `━━━━━━━━━━━━━━━━━━━━\n`;
  text += `  ${currentPlan.name}\n`;
  text += `━━━━━━━━━━━━━━━━━━━━\n\n`;

  // Outfit section
  text += `【コーディネート】\n\n`;
  for (let d = 0; d < days; d++) {
    const date = new Date(start);
    date.setDate(date.getDate() + d);
    const dow = dayNames[date.getDay()];
    text += `■ ${date.getMonth()+1}/${date.getDate()}(${dow}) - ${d+1}日目\n`;
    for (const cat of categories) {
      const cell = allCells.find(c => c.day === d && c.category === cat);
      if (cell && cell.memo) {
        text += `  ${cat}: ${cell.memo}\n`;
      }
    }
    text += `\n`;
  }

  // Packing list section
  const members = [...new Set(allItems.map(i => i.member))];
  text += `【持ち物リスト】\n\n`;
  for (const member of members) {
    const memberItems = allItems.filter(i => i.member === member).sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
    const total = memberItems.filter(i => !i.parentId).length;
    const checked = memberItems.filter(i => !i.parentId && i.checked).length;
    text += `@ ${member}  (${checked}/${total})\n`;
    text += `${'─'.repeat(30)}\n`;

    const cats = [];
    const catMap = {};
    memberItems.forEach(item => {
      if (!item.parentId) {
        if (!catMap[item.category]) { catMap[item.category] = []; cats.push(item.category); }
        catMap[item.category].push(item);
      }
    });

    for (const cat of cats) {
      const catItems = catMap[cat];
      text += `\n  【${cat}】\n`;
      for (const item of catItems) {
        const check = item.checked ? '✅' : '⬜';
        const imp = item.important ? ' ‼️' : '';
        const note = item.note ? ` (${item.note})` : '';
        text += `    ${check} ${item.name}${imp}${note}\n`;
        // Sub-items
        const subs = memberItems.filter(s => s.parentId === item.id);
        for (const sub of subs) {
          const subCheck = sub.checked ? '✅' : '⬜';
          text += `      ${subCheck} ${sub.name}\n`;
        }
      }
    }
    text += `\n`;
  }

  text += `━━━━━━━━━━━━━━━━━━━━\n`;
  text += `ルームコード: ${roomCode || 'なし'}\n`;
  text += `作成日: ${new Date().toLocaleDateString('ja-JP')}\n`;

  // Try Web Share API first (mobile)
  if (navigator.share) {
    try {
      await navigator.share({ title: currentPlan.name, text: text });
      return;
    } catch(e) {}
  }

  // Fallback: show in modal for copy
  showModal(`
    <div class="flex justify-between items-center mb-3">
      <h3 class="font-bold text-lg">テキスト共有</h3>
      <button onclick="closeModal()" class="text-gray-400 text-2xl">&times;</button>
    </div>
    <textarea id="exportTextArea" readonly style="width:100%;height:300px;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:13px;font-family:monospace;resize:none;-webkit-user-select:text;user-select:text">${text.replace(/</g,'&lt;')}</textarea>
    <div class="flex gap-2 mt-3">
      <button class="btn btn-primary flex-1" onclick="copyTextToClipboard(document.getElementById('exportTextArea').value,'コピーしました！')">コピー</button>
      <button class="btn btn-outline flex-1" onclick="closeModal();downloadTextFile()">ファイル保存</button>
    </div>
  `);
  window.downloadTextFile = () => {
    const blob = new Blob([text], { type: 'text/plain; charset=utf-8' });
    const link = document.createElement('a');
    link.download = currentPlan.name + '_持ち物リスト.txt';
    link.href = URL.createObjectURL(blob);
    link.click();
  };
}

async function renderPackingList() {
  if (!currentPlan) return;
  const container = document.getElementById('packingList');

  const members = await getRoomMembers();

  if (members.length === 0 && allItems.length === 0) {
    // Empty state
    container.innerHTML = `<div class="packing-section">
      <h2 class="font-bold text-lg mb-3">持ち物リスト</h2>

        <button class="btn btn-primary text-sm" onclick="showAddMemberModal()">メンバーを追加して始める</button>
      </div>
    </div>`;
    return;
  }

  // Default to first member
  if (!currentMember || !members.includes(currentMember)) {
    currentMember = members[0];
  }

  const memberItems = allItems.filter(i => i.member === currentMember).sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  const total = memberItems.filter(i => !i.parentId || i.parentId === null).length;
  const checked = memberItems.filter(i => (!i.parentId || i.parentId === null) && i.checked === true).length;
  const pct = total > 0 ? Math.round(checked / total * 100) : 0;
  const curMC = getMemberColor(members, currentMember);

  // Member tabs
  let tabsHtml = members.map(m => {
    const mc = getMemberColor(members, m);
    const isActive = m === currentMember;
    const style = isActive ? `border-color:${mc.border};background:${mc.bg};color:${mc.text}` : '';
    return `<div class="member-tab ${isActive ? 'active' : ''}" onclick="switchMember('${escapeHtml(m)}')" data-member="${escapeHtml(m)}" style="${style}"><span onclick="event.stopPropagation();showEditMemberModal('${escapeHtml(m)}')" style="margin-right:4px;font-size:12px;opacity:0.5">✏️</span>${escapeHtml(m)}</div>`;
  }).join('');
  tabsHtml += `<div class="member-tab add-tab" onclick="showAddMemberModal()">+ 追加</div>`;

  let html = `<div class="packing-section">
    <div class="flex justify-between items-center mb-1">
      <h2 class="font-bold text-lg">持ち物リスト</h2>
      <span class="text-sm text-gray-500">${checked}/${total} (${pct}%)</span>
    </div>
    <div class="packing-progress"><div class="packing-progress-bar" style="width:${pct}%;background:${curMC.border}"></div></div>

  // Group by category
  const cats = [];

  memberItems.forEach(item => {
    if (!item.parentId || item.parentId === null) {
      if (!catMap[item.category]) {
        catMap[item.category] = [];
        cats.push(item.category);
      }
      catMap[item.category].push(item);
    }
  });

  // Render categories in a sortable wrapper
  html += `<div id="catSortable">`;

  for (let ci = 0; ci < cats.length; ci++) {
    const cat = cats[ci];
    const catItems = catMap[cat] || [];
    const catChecked = catItems.filter(i => i.checked).length;
    const collapseKey = (currentMember || '') + '::' + cat;
    const isCollapsed = collapsedCats[collapseKey] === false ? false : true;
    const arrow = isCollapsed ? '▶' : '▼';
    html += `<div class="cat-group" data-cat="${escapeHtml(cat)}">
      <div class="packing-cat-header cat-drag-handle" onclick="toggleCatCollapse('${escapeHtml(cat)}')" style="cursor:pointer;background:${curMC.bg};border-color:${curMC.border};color:${curMC.text}">
        <span><span id="cat-arrow-${cat.replace(/[^a-zA-Z0-9\u3000-\u9fff]/g, '_')}" style="font-size:.7rem;margin-right:4px">${arrow}</span> ${escapeHtml(cat)}</span>
        <div class="flex items-center gap-2">
          <span style="font-size:.8rem;color:${curMC.text};opacity:.7">${catChecked}/${catItems.length}</span>
          <button class="act-btn" style="color:${curMC.text};opacity:.7;font-size:.9rem" onclick="event.stopPropagation();showEditCategoryModal('${escapeHtml(cat)}')">...</button>
        </div>
      </div>
      <div id="cat-items-${cat.replace(/[^a-zA-Z0-9\u3000-\u9fff]/g, '_')}" class="item-sortable" data-cat="${escapeHtml(cat)}" style="${isCollapsed ? 'display:none' : ''}">`;

    for (const item of catItems) {
      const subs = memberItems.filter(s => s.parentId === item.id);
      html += renderPackingItem(item, false, curMC);
      for (const sub of subs) {
        html += renderPackingItem(sub, true, curMC);
      }
    }

    // Inline add-item row for this category
    html += `<div class="cat-add-row" style="display:flex;gap:6px;padding:8px 4px 4px">
      <input type="text" placeholder="+ アイテム追加" onkeydown="if(event.key==='Enter')quickAddItemToCat('${escapeHtml(cat).replace(/'/g, "\\'")}', this)" style="flex:1;padding:8px 10px;border:1px dashed #d4c8b0;border-radius:8px;font-size:14px;background:#fff;color:#666" />
      <button class="btn btn-primary" style="padding:6px 14px;font-size:13px;min-height:34px" onclick="quickAddItemToCat('${escapeHtml(cat).replace(/'/g, "\\'")}', this.previousElementSibling)">追加</button>
    </div>`;

    html += `</div></div>`;
  }

  html += `</div>`;

  // Category / recommendations buttons
  html += `<div class="flex gap-2 mt-3">
    <button class="btn btn-outline text-sm flex-1" onclick="showAddCategoryModal()">+ カテゴリ追加</button>
    <button class="btn btn-outline text-sm flex-1" onclick="showAddDefaultItems()">おすすめ追加</button>
  </div>`;

  // Packing memo
  const packingMemoKey = 'packingMemo_' + currentMember;
  const packingMemoSnap = await roomRef.child(packingMemoKey).once('value');
  const packingMemo = packingMemoSnap.val() || '';
  html += `<div style="margin-top:14px">
    <div style="font-size:.9rem;font-weight:700;color:#888;margin-bottom:4px">📝 メモ</div>
    <textarea id="packingMemoArea" style="width:100%;min-height:60px;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:15px;resize:vertical;background:#fafafa;-webkit-user-select:text;user-select:text" placeholder="持ち物に関するメモ..." onblur="savePackingMemo()">${escapeHtml(packingMemo)}</textarea>
  </div>`;

  html += `</div>`;
  container.innerHTML = html;

  // Initialize Sortable for categories
  initSortable();
  // Re-apply tab visibility
  applyTabState();
}

function renderPackingItem(item, isSub, mc) {
  const importantHtml = item.important ? '<span class="item-important">‼️</span>' : '';
  const noteHtml = item.note ? `<div class="item-note">${escapeHtml(item.note)}</div>` : '';
  const checkColor = mc ? mc.border : '#999';
  return `<div class="packing-item ${item.checked ? 'checked' : ''} ${isSub ? 'sub-item' : ''}" data-id="${item.id}">
    <span class="drag-handle" style="cursor:grab;color:#ccc;padding:0 4px;font-size:1rem;touch-action:none">⠿</span>
    <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="togglePackingItem('${item.id}')" style="accent-color:${checkColor}" />
    <div class="item-content" onclick="showEditItemModal('${item.id}')">

async function renameMember(oldName) {
  const newName = document.getElementById('editMemberName').value.trim();
  if (!newName || newName === oldName) { closeModal(); return; }
  closeModal();
  // Batch update for speed
  const updates = {};
  const allItems = await getAllPackingItems();
  for (const item of allItems.filter(i => i.member === oldName)) {
    updates[`packingItems/${item.id}/member`] = newName;
  }
  const allCells = await getAllCells();
  for (const cell of allCells.filter(c => c.member === oldName)) {
    updates[`cells/${cell.id}/member`] = newName;
  }
  if (Object.keys(updates).length > 0) {
    await roomRef.update(updates);
  }
  // Try to rename in Firebase. If not found, add as new.
  const snap = await roomRef.child('members').once('value');
  let found = false;
  if (snap.val()) {
    snap.forEach(c => {
      if (c.val().name === oldName) {
        roomRef.child('members').child(c.key).update({ name: newName });
        found = true;
      }
    });
  }
  if (!found) {
    await addRoomMember(newName);
  }
  currentMember = newName;
  localStorage.setItem('myMemberName', newName);
  renderGrid();
  renderPackingList();
}

async function confirmDeleteMember(name) {
  const allItems = await getAllPackingItems();
  for (const item of allItems.filter(i => i.member === name)) {
    await roomRef.child('packingItems').child(item.id).remove();

  const allCells = await getAllCells();
  for (const cell of allCells.filter(c => c.member === name)) {
    await roomRef.child('cells').child(cell.id).remove();

  await removeRoomMember(name);

  currentMember = null;
  closeModal();
  renderGrid();
  renderPackingList();
}

async function addMemberWithDefaults(name) {
  closeModal();
  await addRoomMember(name);
  currentMember = name;
  const packingData = DEFAULT_PACKING_MEMBERS[name] || DEFAULT_PACKING;
  const updates = {};
  let order = 0;
  for (const g of packingData) {
    for (const item of g.items) {
      const key = roomRef.child('packingItems').push().key;
      updates['packingItems/' + key] = {
        planId: currentPlanId, member: name, category: g.cat,
        name: item.name, checked: false, important: item.important || false, note: item.note || '', parentId: null, sortOrder: order++
      };
      if (item.subs) {
        for (const sub of item.subs) {
          const subKey = roomRef.child('packingItems').push().key;
          updates['packingItems/' + subKey] = {
            planId: currentPlanId, member: name, category: g.cat,
            name: sub, checked: false, important: false, note: '', parentId: key, sortOrder: 0
          };
        }
      }
    }
  }
  await roomRef.update(updates);
  renderGrid();
  renderPackingList();
}

// ---- Custom Defaults (localStorage) ----
function getCustomDefaultsKey(memberName) { return 'customDefaults_' + memberName; }

function getCustomDefaults(memberName) {
  try {
    const stored = localStorage.getItem(getCustomDefaultsKey(memberName));
    if (stored) {
      const parsed = JSON.parse(stored);
      if (Array.isArray(parsed)) return parsed;
    }
  } catch (e) {}
  return DEFAULT_PACKING_MEMBERS[memberName] || DEFAULT_PACKING;
}

function saveCustomDefaults(memberName, data) {
  localStorage.setItem(getCustomDefaultsKey(memberName), JSON.stringify(data));
}

function resetCustomDefaults(memberName) {
  localStorage.removeItem(getCustomDefaultsKey(memberName));
}

  </div>
  <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px">${tabsHtml}</div>
  <p class="text-xs text-gray-500 mb-2">「${escapeHtml(editingDefaultsMember)}」のおすすめリストを編集</p>`;

  editingDefaultsData.forEach((g, gi) => {
    html += `<div style="background:#fafaf8;border:1px solid #eee;border-radius:10px;padding:10px;margin-bottom:10px">
      <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center">
        <input type="text" value="${escapeHtml(g.cat)}" oninput="editingDefaultsData[${gi}].cat=this.value" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-weight:700;font-size:14px;background:#fff" />
        <button onclick="removeDefaultCat(${gi})" style="color:#d96b6b;background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px">×</button>
      </div>`;
    (g.items || []).forEach((it, ii) => {
      html += `<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px;padding-left:6px">
        <span style="color:#aaa;font-size:14px">•</span>
        <input type="text" value="${escapeHtml(it.name)}" oninput="editingDefaultsData[${gi}].items[${ii}].name=this.value" style="flex:1;padding:5px 8px;border:1px solid #eee;border-radius:6px;font-size:13px;background:#fff" />
        <button onclick="removeDefaultItem(${gi}, ${ii})" style="color:#d96b6b;background:none;border:none;font-size:16px;cursor:pointer;padding:2px 6px">×</button>
      </div>`;
      if (it.subs && it.subs.length) {
        it.subs.forEach((s, si) => {
          html += `<div style="display:flex;gap:6px;align-items:center;margin-bottom:2px;padding-left:22px">
            <span style="color:#bbb;font-size:11px">└</span>
            <input type="text" value="${escapeHtml(s)}" oninput="editingDefaultsData[${gi}].items[${ii}].subs[${si}]=this.value" style="flex:1;padding:3px 8px;border:1px solid #eee;border-radius:6px;font-size:12px;color:#666;background:#fff" />
            <button onclick="removeDefaultSub(${gi}, ${ii}, ${si})" style="color:#d96b6b;background:none;border:none;font-size:13px;cursor:pointer;padding:2px 6px">×</button>
          </div>`;
        });
      }
      html += `<div style="padding-left:22px;margin-bottom:6px"><button onclick="addDefaultSub(${gi}, ${ii})" style="font-size:11px;color:#888;background:none;border:none;cursor:pointer">+ サブ</button></div>`;
    });
    html += `<button onclick="addDefaultItem(${gi})" style="font-size:12px;color:#5a5245;background:#fff;border:1px dashed #d4c8b0;border-radius:6px;padding:5px 12px;cursor:pointer;margin-top:4px">+ アイテム追加</button>`;
    html += `</div>`;
  });

  html += `<button onclick="addDefaultCat()" class="btn btn-outline w-full" style="font-size:13px;margin-bottom:12px">+ カテゴリ追加</button>
    <div style="display:flex;gap:8px">
      <button onclick="resetDefaults()" class="btn btn-outline" style="flex:1;color:#999;font-size:13px">初期に戻す</button>
      <button onclick="saveDefaults()" class="btn btn-primary" style="flex:1">保存</button>
    </div>`;

  showModal(html);
}

async function switchEditDefaultsMember(name) {
  editingDefaultsMember = name;
  editingDefaultsData = JSON.parse(JSON.stringify(getCustomDefaults(name)));
  renderEditDefaultsModal();
}

function removeDefaultCat(gi) {
  if (!confirm('このカテゴリを削除しますか？')) return;
  editingDefaultsData.splice(gi, 1);
  renderEditDefaultsModal();
}
function removeDefaultItem(gi, ii) {
  editingDefaultsData[gi].items.splice(ii, 1);
  renderEditDefaultsModal();
}
function removeDefaultSub(gi, ii, si) {
  editingDefaultsData[gi].items[ii].subs.splice(si, 1);
  renderEditDefaultsModal();
}
function addDefaultItem(gi) {
  editingDefaultsData[gi].items = editingDefaultsData[gi].items || [];
  editingDefaultsData[gi].items.push({ name: '' });
  renderEditDefaultsModal();
}
function addDefaultSub(gi, ii) {
  if (!editingDefaultsData[gi].items[ii].subs) editingDefaultsData[gi].items[ii].subs = [];
  editingDefaultsData[gi].items[ii].subs.push('');
  renderEditDefaultsModal();
}
function addDefaultCat() {
  editingDefaultsData.push({ cat: '新しいカテゴリ', items: [] });
  renderEditDefaultsModal();
}
function saveDefaults() {
  const cleaned = editingDefaultsData
    .map(g => ({
      cat: (g.cat || '').trim(),
      items: (g.items || [])
        .filter(i => i.name && i.name.trim())
        .map(i => {
          const out = { name: i.name.trim() };
          if (i.important) out.important = true;
          if (i.note) out.note = i.note;
          if (i.subs && i.subs.length) {
            const subs = i.subs.filter(s => s && s.trim()).map(s => s.trim());
            if (subs.length) out.subs = subs;
          }
          return out;
        })
    }))
    .filter(g => g.cat && g.items.length > 0);
  saveCustomDefaults(editingDefaultsMember, cleaned);
  closeModal();
}
function resetDefaults() {
  if (!confirm('「' + editingDefaultsMember + '」のおすすめリストを初期状態に戻しますか？')) return;
  resetCustomDefaults(editingDefaultsMember);
  editingDefaultsData = JSON.parse(JSON.stringify(DEFAULT_PACKING_MEMBERS[editingDefaultsMember] || DEFAULT_PACKING));
  renderEditDefaultsModal();
}

// ---- Default Items ----
async function showAddDefaultItems() {
  // Use member-specific defaults if available, otherwise generic
  const packingData = getCustomDefaults(currentMember);

  let html = `<div class="flex justify-between items-center mb-4">
    <h3 class="font-bold text-lg">おすすめアイテム追加</h3>
    <button onclick="closeModal()" class="text-gray-400 text-2xl">&times;</button>
  </div>
  <p class="text-sm text-gray-500 mb-3">「${escapeHtml(currentMember)}」におすすめアイテムを追加します</p>`;

  for (const g of packingData) {
    html += `<div class="packing-cat-header mb-1" style="margin-top:8px"><span>${escapeHtml(g.cat)}</span></div>`;
    html += `<div class="text-sm text-gray-600 mb-2">${g.items.map(i => {
      let t = escapeHtml(i.name);
      if (i.important) t += ' ‼️';
      if (i.note) t += ` <span style="color:#bbb">(${escapeHtml(i.note)})</span>`;
      return t;
    }).join('、')}</div>`;
  }

  html += `<button class="btn btn-primary w-full mt-2" id="addDefaultsBtn" onclick="addAllDefaults()">すべて追加</button>`;
  showModal(html);
}

let isAddingDefaults = false;
async function addAllDefaults() {
  if (isAddingDefaults) return;
  isAddingDefaults = true;
  const btn = document.getElementById('addDefaultsBtn');
  if (btn) { btn.textContent = '追加中...'; btn.style.opacity = '0.5'; btn.disabled = true; }
  try {
    const packingData = getCustomDefaults(currentMember);
    const updates = {};
    let order = 0;
    for (const g of packingData) {
      for (const item of g.items) {
        const key = roomRef.child('packingItems').push().key;
        updates['packingItems/' + key] = {
          planId: currentPlanId, member: currentMember, category: g.cat,
          name: item.name, checked: false, important: item.important || false, note: item.note || '', parentId: null, sortOrder: order++
        };
        if (item.subs) {
          for (const sub of item.subs) {
            const subKey = roomRef.child('packingItems').push().key;
            updates['packingItems/' + subKey] = {
              planId: currentPlanId, member: currentMember, category: g.cat,
              name: sub, checked: false, important: false, note: '', parentId: key, sortOrder: 0
            };
          }
        }
      }
    }
    await roomRef.update(updates);
    closeModal();
    renderPackingList();
  } finally {
    isAddingDefaults = false;
  }
}

// ---- Toggle / Delete ----
async function togglePackingItem(id) {
  const allItems = await getAllPackingItems();
  const item = allItems.find(i => i.id === id);
  if (item) {
    const newChecked = !item.checked;
    await roomRef.child('packingItems').child(id).update({ checked: newChecked });
    // Also toggle sub-items
    if (!item.parentId) {
      const subs = allItems.filter(i => i.parentId === id);
      for (const sub of subs) {
        await roomRef.child('packingItems').child(sub.id).update({ checked: newChecked });
      }
    }
    renderPackingList();
  }
}

async function deletePackingItem(id) {
  const allItems = await getAllPackingItems();
  // Delete sub-items too
  const subs = allItems.filter(i => i.parentId === id);
  for (const sub of subs) {
    await roomRef.child('packingItems').child(sub.id).remove();
  }
  await roomRef.child('packingItems').child(id).remove();
  closeModal();
  renderPackingList();
}

// ============ Sortable (Drag & Drop) ============
function initSortable() {
  // Category sorting (drag whole category blocks)
  const catContainer = document.getElementById('catSortable');
  if (catContainer && typeof Sortable !== 'undefined') {
    Sortable.create(catContainer, {
      animation: 200,
      handle: '.cat-drag-handle',
      draggable: '.cat-group',
      delay: 400,
      delayOnTouchOnly: true,
      touchStartThreshold: 8,
      onEnd: async (evt) => {
        const groups = catContainer.querySelectorAll('.cat-group');
        const allItems = await getAllPackingItems();
        const memberItems = allItems.filter(i => i.member === currentMember);
        let order = 0;
        for (const group of groups) {
          const cat = group.dataset.cat;
          const catItems = memberItems.filter(i => i.category === cat);
          for (const item of catItems) {
            await roomRef.child('packingItems').child(item.id).update({ sortOrder: order++ });
          }
        }
        renderPackingList();
      }
    });

    // Item sorting within each category
    const itemContainers = document.querySelectorAll('.item-sortable');
    for (const ic of itemContainers) {
      Sortable.create(ic, {
        animation: 200,
        handle: '.drag-handle',
        draggable: '.packing-item:not(.sub-item)',
        group: 'items',
        delay: 400,
        delayOnTouchOnly: true,
        touchStartThreshold: 8,
        onEnd: async (evt) => {
          const container = evt.to;
          const newCat = container.dataset.cat;
          const itemEls = container.querySelectorAll('.packing-item:not(.sub-item)');
          const allItems = await getAllPackingItems();
          let order = 0;
          for (const el of itemEls) {
            const id = el.dataset.id;
            if (id) {
              await roomRef.child('packingItems').child(id).update({ sortOrder: order++, category: newCat });
              const subs = allItems.filter(i => i.parentId === id);
              for (const sub of subs) {
                await roomRef.child('packingItems').child(sub.id).update({ category: newCat });
              }
            }
          }
          renderPackingList();
        }
      });
    }
  }
}

let currentTab = 'outfit';

function switchTab(tab) {
  currentTab = tab;
  const outfitEls = document.querySelectorAll('#dayTabs, #dayCard, .export-grid-wrap');
  const packingEl = document.getElementById('packingList');
  const tabs = document.querySelectorAll('#bottomTabBar button');

  tabs.forEach(t => { t.style.color = '#aaa'; t.style.fontWeight = '500'; t.style.borderBottom = '3px solid transparent'; });

  if (tab === 'outfit') {
    outfitEls.forEach(el => { if(el) el.style.display = ''; });
    if (packingEl) packingEl.style.display = 'none';
    if (tabs[0]) { tabs[0].style.color = '#5a5245'; tabs[0].style.fontWeight = '700'; tabs[0].style.borderBottom = '3px solid #5a5245'; }
  } else {
    outfitEls.forEach(el => { if(el) el.style.display = 'none'; });
    if (packingEl) packingEl.style.display = '';
    if (tabs[1]) { tabs[1].style.color = '#5a5245'; tabs[1].style.fontWeight = '700'; tabs[1].style.borderBottom = '3px solid #5a5245'; }
  }
}

// ============ Image Viewer ============
async function openImageViewer(day, category, index) {
  const allCells = await getAllCells();
  const cell = allCells.find(c => c.day === day && c.category === category);
  if (!cell || !cell.images || cell.images.length === 0) return;

  let currentIdx = index;
  const images = cell.images;

  function renderViewer() {
    const hasPrev = currentIdx > 0;
    const hasNext = currentIdx < images.length - 1;
    const counter = images.length > 1 ? `<div style="color:rgba(255,255,255,.7);font-size:.9rem;margin-top:8px">${currentIdx + 1} / ${images.length}</div>` : '';

    const el = document.getElementById('imageViewer');
    if (el) {
      el.querySelector('.viewer-img').src = images[currentIdx];
      el.querySelector('.viewer-counter').innerHTML = counter;
      el.querySelector('.viewer-prev').style.display = hasPrev ? '' : 'none';
      el.querySelector('.viewer-next').style.display = hasNext ? '' : 'none';
    }
  }

  const overlay = document.createElement('div');
  overlay.id = 'imageViewer';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const hasPrev = currentIdx > 0;
  const hasNext = currentIdx < images.length - 1;
  const counter = images.length > 1 ? `${currentIdx + 1} / ${images.length}` : '';

  overlay.innerHTML = `
    <button onclick="this.parentElement.remove()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;padding:8px;z-index:201">✕</button>
    <button class="viewer-prev" onclick="event.stopPropagation();viewerNav(-1)" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.5rem;cursor:pointer;padding:12px 16px;border-radius:50%;${hasPrev ? '' : 'display:none'}">‹</button>
    <button class="viewer-next" onclick="event.stopPropagation();viewerNav(1)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.5rem;cursor:pointer;padding:12px 16px;border-radius:50%;${hasNext ? '' : 'display:none'}">›</button>
    <img class="viewer-img" src="${images[currentIdx]}" style="max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px" />
    <div class="viewer-counter" style="color:rgba(255,255,255,.7);font-size:.9rem;margin-top:8px">${counter}</div>
    <div style="display:flex;gap:12px;margin-top:16px">
      <button onclick="event.stopPropagation();editCellFromViewer(${day},'${category}')" style="background:rgba(255,255,255,.15);border:none;color:#fff;font-size:.9rem;cursor:pointer;padding:10px 20px;border-radius:24px">編集</button>
    </div>
  `;
  document.body.appendChild(overlay);

  // Swipe support for viewer
  let vStartX = 0;
  overlay.addEventListener('touchstart', e => { vStartX = e.touches[0].clientX; }, { passive: true });
  overlay.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - vStartX;
    if (Math.abs(dx) > 60) {
      if (dx < 0 && currentIdx < images.length - 1) { currentIdx++; renderViewer(); }
      else if (dx > 0 && currentIdx > 0) { currentIdx--; renderViewer(); }
    }
  }, { passive: true });

  window.viewerNav = function(dir) {
    currentIdx += dir;
    if (currentIdx < 0) currentIdx = 0;
    if (currentIdx >= images.length) currentIdx = images.length - 1;
    renderViewer();
  };
}

async function quickTextCell(day, category) {
  const catLabel = CATEGORIES.find(c => c.key === category)?.label || category;

  date.setDate(date.getDate() + day);
  const dayNames = ['日','月','火','水','木','金','土'];

  showModal(`
